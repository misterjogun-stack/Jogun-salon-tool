<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>JOGUN LOTTO APP</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#000000">

<link rel="apple-touch-icon" href="icon-192.png">

<style>

body{
background:#02020c;
color:white;
text-align:center;
font-family:Arial;
padding-top:50px;
}

.title{
font-size:40px;
font-weight:900;
color:#00eaff;
text-shadow:0 0 20px #00eaff;
}

.instagram{
color:#ff2bd6;
margin-bottom:30px;
}

button{
padding:16px 35px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;

background:linear-gradient(45deg,#00eaff,#0066ff);
color:white;

box-shadow:0 0 20px #00eaff;
}

#numbers{
margin-top:40px;
display:flex;
justify-content:center;
gap:20px;
}

.ball{

width:70px;
height:70px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:22px;
font-weight:bold;

background:radial-gradient(circle at 30% 30%, white, #ffd000, #ff8c00);

box-shadow:
0 0 15px rgba(255,255,255,0.7),
inset -5px -10px 15px rgba(0,0,0,0.4);

transform:scale(0);
animation:pop 0.6s forwards;

}

@keyframes pop{

0%{transform:scale(0);}
60%{transform:scale(1.2);}
100%{transform:scale(1);}

}

</style>
</head>

<body>

<div class="title">JOGUN LOTTO</div>

<div class="instagram">@soowan_jogun</div>

<button onclick="draw()">번호 추첨</button>

<div id="numbers"></div>

<script>

function draw(){

let container=document.getElementById("numbers");

container.innerHTML="";

let numbers=[];

while(numbers.length<5){

let n=Math.floor(Math.random()*45)+1;

if(!numbers.includes(n)){
numbers.push(n);
}

}

numbers.sort((a,b)=>a-b);

numbers.forEach((num,i)=>{

setTimeout(()=>{

let ball=document.createElement("div");

ball.className="ball";

ball.innerText=num;

container.appendChild(ball);

},i*700);

});

}

/* 서비스워커 등록 */

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js");

}

</script>

</body>
</html>
