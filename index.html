<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Salon Color Calc</title>
  <meta name="theme-color" content="#0b0f1f" />
  <style>
    :root{
      --bg0:#070a14;
      --bg1:#0b0f1f;
      --glass: rgba(255,255,255,.08);
      --line: rgba(255,255,255,.14);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.62);
      --neon: #22c55e;
      --neon2:#60a5fa;
      --pink:#fb7185;
      --shadow: 0 18px 50px rgba(0,0,0,.45);
      --r: 22px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(900px 600px at 15% 12%, rgba(96,165,250,.22), transparent 55%),
        radial-gradient(900px 600px at 85% 20%, rgba(251,113,133,.18), transparent 55%),
        radial-gradient(900px 700px at 50% 92%, rgba(34,197,94,.16), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      min-height:100vh;
      padding: 16px 16px 90px;
    }
    header{
      max-width: 760px;
      margin: 0 auto 12px;
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:12px;
      padding: 6px 2px;
    }
    .title{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .title .h{
      font-size: 18px;
      font-weight: 900;
      letter-spacing: .2px;
    }
    .title .s{
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }
    .badge{
      font-size: 12px;
      color: rgba(255,255,255,.86);
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      padding: 8px 10px;
      border-radius: 999px;
      user-select:none;
      white-space:nowrap;
    }
    .wrap{
      max-width: 760px;
      margin: 0 auto;
      display:grid;
      gap: 12px;
    }
    .card{
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .pad{padding: 14px;}
    .grid2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 560px){
      .grid2{grid-template-columns:1fr;}
    }
    label{
      display:block;
      margin: 10px 0 6px;
      font-size: 12px;
      color: var(--muted);
    }
    input{
      width:100%;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.20);
      color: var(--text);
      padding: 12px 12px;
      border-radius: 14px;
      font-size: 16px;
      outline:none;
    }
    input::placeholder{color: rgba(255,255,255,.35)}
    .chips{display:flex; gap:8px; flex-wrap:wrap; margin-top: 8px;}
    .chip{
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.88);
      padding: 10px 12px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 13px;
      user-select:none;
      transition: transform .05s ease, background .2s ease, border-color .2s ease;
    }
    .chip:active{transform: translateY(1px)}
    .chip.on{
      border-color: rgba(34,197,94,.35);
      background: rgba(34,197,94,.14);
    }
    .chip.blue.on{
      border-color: rgba(96,165,250,.35);
      background: rgba(96,165,250,.14);
    }
    .row{display:flex; gap:10px; flex-wrap:wrap; margin-top: 12px;}
    .btn{
      flex:1;
      min-width: 140px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.08);
      color: var(--text);
      padding: 12px 12px;
      border-radius: 16px;
      font-weight: 900;
      font-size: 15px;
      user-select:none;
    }
    .btn.neon{
      border-color: rgba(34,197,94,.40);
      background: rgba(34,197,94,.16);
      box-shadow: 0 0 0 rgba(34,197,94,0);
    }
    .btn.neon:active{transform: translateY(1px)}
    .btn.copy{
      border-color: rgba(96,165,250,.40);
      background: rgba(96,165,250,.16);
    }
    .result{
      margin-top: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      border-radius: 18px;
      padding: 12px;
      font-family: var(--mono);
      font-size: 13px;
      white-space: pre-wrap;
      color: rgba(255,255,255,.88);
    }
    .result .big{
      font-size: 20px;
      font-weight: 900;
      letter-spacing: .2px;
      margin-bottom: 6px;
      font-family: var(--sans);
    }
    .muted{color: var(--muted); font-size: 12px; line-height: 1.4;}
    .hr{height:1px;background:var(--line);opacity:.7;margin: 14px 0;}
    .historyItem{
      border: 1px solid var(--line);
      background: rgba(0,0,0,.18);
      border-radius: 16px;
      padding: 10px 12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-top: 8px;
    }
    .historyItem .txt{
      font-family: var(--mono);
      font-size: 12px;
      color: rgba(255,255,255,.86);
      line-height: 1.35;
      white-space: pre-line;
    }
    .historyItem .act{
      display:flex;
      gap:8px;
    }
    .mini{
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.86);
      padding: 9px 10px;
      border-radius: 12px;
      font-weight: 900;
      font-size: 12px;
      user-select:none;
      white-space:nowrap;
    }
    .mini.del{
      border-color: rgba(251,113,133,.40);
      background: rgba(251,113,133,.14);
    }
    .toast{
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      background: rgba(0,0,0,.78);
      color: white;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      max-width: 90vw;
      text-align:center;
      z-index: 999;
    }
    .toast.on{opacity: 1;}
  </style>
</head>
<body>
  <header>
    <div class="title">
      <div class="h">Salon Color Calc</div>
      <div class="s">인스타 감성 · 초간단 · 결과 복사 · 최근 기록 자동 저장</div>
    </div>
    <div class="badge" id="badge">AUTO SAVE</div>
  </header>

  <div class="wrap">
    <div class="card pad">
      <div class="grid2">
        <div>
          <label>총 사용량 (g)</label>
          <div class="chips" id="chipsTotal"></div>
          <input id="total" inputmode="decimal" placeholder="예: 120" />
        </div>
        <div>
          <label>비율 프리셋</label>
          <div class="chips" id="chipsRatio"></div>
          <div class="grid2">
            <div>
              <label>염모제 비율</label>
              <input id="dye" inputmode="decimal" placeholder="예: 1" />
            </div>
            <div>
              <label>산화제 비율</label>
              <input id="dev" inputmode="decimal" placeholder="예: 1.5" />
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <button class="btn neon" id="btnCalc">계산하기</button>
        <button class="btn copy" id="btnCopy">결과 복사</button>
      </div>

      <div class="result" id="out">
        <div class="big">—</div>
        <div class="muted">총량/비율을 입력하거나 버튼을 눌러 계산하세요.</div>
      </div>

      <div class="hr"></div>

      <div class="muted">팁: 총량 버튼 → 비율 버튼만 누르면 바로 계산됩니다.</div>
    </div>

    <div class="card pad">
      <div class="h">최근 기록 (최대 5개)</div>
      <div class="muted">미용실에서 자주 쓰는 조합을 자동으로 남겨둡니다.</div>
      <div id="history"></div>
      <div class="row">
        <button class="btn" id="btnClear" style="border-color: rgba(251,113,133,.35); background: rgba(251,113,133,.12);">기록 전체 삭제</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">완료</div>

<script>
  const $ = (id)=>document.getElementById(id);
  const toast = (msg)=>{
    const t = $("toast");
    t.textContent = msg;
    t.classList.add("on");
    setTimeout(()=>t.classList.remove("on"), 1300);
  };
  const num = (v)=>{
    const x = parseFloat(String(v||"").replace(/,/g,""));
    return Number.isFinite(x) ? x : NaN;
  };
  const fmt = (x)=> Number.isFinite(x) ? x.toFixed(1) : "—";

  const LS = {
    get(k, fallback){ try{ const v = localStorage.getItem(k); return v ? JSON.parse(v) : fallback; }catch{ return fallback; } },
    set(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch{} }
  };

  async function copyText(text){
    try{
      await navigator.clipboard.writeText(text);
      return true;
    }catch{
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      try{ document.execCommand("copy"); }catch{}
      document.body.removeChild(ta);
      return true;
    }
  }

  const totalPresets = [60, 90, 120, 150, 180];
  const ratioPresets = [
    {d:1, v:1, label:"1:1"},
    {d:1, v:1.5, label:"1:1.5"},
    {d:1, v:2, label:"1:2"},
  ];

  function renderChips(){
    const tWrap = $("chipsTotal");
    totalPresets.forEach(v=>{
      const b = document.createElement("button");
      b.className = "chip";
      b.textContent = v + "g";
      b.onclick = ()=>{
        $("total").value = v;
        LS.set("val.total", v);
        calc(true);
        toast("총량 선택");
      };
      tWrap.appendChild(b);
    });

    const rWrap = $("chipsRatio");
    ratioPresets.forEach(p=>{
      const b = document.createElement("button");
      b.className = "chip blue";
      b.textContent = p.label;
      b.onclick = ()=>{
        $("dye").value = p.d;
        $("dev").value = p.v;
        LS.set("val.dye", p.d);
        LS.set("val.dev", p.v);
        calc(true);
        toast("비율 선택");
      };
      rWrap.appendChild(b);
    });
  }

  function bind(id, key){
    const el = $(id);
    el.value = LS.get(key, "") ?? "";
    el.addEventListener("input", ()=>LS.set(key, el.value));
  }

  function setOut(title, body){
    $("out").innerHTML = `<div class="big">${title}</div><div class="muted">${body}</div>`;
  }

  function calc(auto=false){
    const total = num($("total").value);
    const dye = num($("dye").value);
    const dev = num($("dev").value);

    if(!Number.isFinite(total) || !Number.isFinite(dye) || !Number.isFinite(dev) || total<=0 || dye<=0 || dev<=0){
      setOut("입력 확인", "총량/비율은 0보다 큰 숫자여야 합니다.");
      return "";
    }

    const r = dye + dev;
    const dyeG = total*(dye/r);
    const devG = total*(dev/r);

    const title = `염모제 ${fmt(dyeG)}g  ·  산화제 ${fmt(devG)}g`;
    const body = `총 ${fmt(total)}g / 비율 ${dye}:${dev}`;

    setOut(title, body);

    const text = `염모제 ${fmt(dyeG)}g\n산화제 ${fmt(devG)}g\n총 ${fmt(total)}g / 비율 ${dye}:${dev}`;

    if(auto) pushHistory({total: total, dye, dev, dyeG, devG});
    return text;
  }

  const HISTORY_KEY = "color.history.v1";

  function pushHistory(item){
    const list = LS.get(HISTORY_KEY, []);
    const key = `${item.total}|${item.dye}|${item.dev}`;
    const filtered = list.filter(x => x.key !== key);
    filtered.unshift({ key, ts: Date.now(), ...item });
    const clipped = filtered.slice(0, 5);
    LS.set(HISTORY_KEY, clipped);
    renderHistory();
  }

  function renderHistory(){
    const wrap = $("history");
    const list = LS.get(HISTORY_KEY, []);
    wrap.innerHTML = "";

    if(list.length === 0){
      wrap.innerHTML = `<div class="result"><div class="big">기록 없음</div><div class="muted">버튼으로 계산하면 자동으로 기록이 쌓입니다.</div></div>`;
      return;
    }

    list.forEach((x, idx)=>{
      const div = document.createElement("div");
      div.className = "historyItem";
      const txt =
`염모제 ${fmt(x.dyeG)}g / 산화제 ${fmt(x.devG)}g
총 ${fmt(x.total)}g · 비율 ${x.dye}:${x.dev}`;
      div.innerHTML = `
        <div class="txt">${txt}</div>
        <div class="act">
          <button class="mini" data-act="use" data-idx="${idx}">불러오기</button>
          <button class="mini del" data-act="del" data-idx="${idx}">삭제</button>
        </div>
      `;
      wrap.appendChild(div);
    });
  }

  $("history").addEventListener("click", async (e)=>{
    const act = e.target?.getAttribute?.("data-act");
    const idx = parseInt(e.target?.getAttribute?.("data-idx"), 10);
    if(!act || !Number.isFinite(idx)) return;

    const list = LS.get(HISTORY_KEY, []);
    const x = list[idx];
    if(!x) return;

    if(act === "use"){
      $("total").value = x.total;
      $("dye").value = x.dye;
      $("dev").value = x.dev;
      LS.set("val.total", x.total);
      LS.set("val.dye", x.dye);
      LS.set("val.dev", x.dev);
      calc(false);
      toast("불러오기 완료");
    }

    if(act === "del"){
      list.splice(idx, 1);
      LS.set(HISTORY_KEY, list);
      renderHistory();
      toast("삭제됨");
    }
  });

  $("btnCalc").onclick = ()=>{ calc(false); };
  $("btnCopy").onclick = async ()=>{
    const t = calc(false);
    if(!t) return;
    await copyText(t);
    toast("복사됨");
  };
  $("btnClear").onclick = ()=>{
    if(!confirm("최근 기록을 모두 삭제할까요?")) return;
    localStorage.removeItem(HISTORY_KEY);
    renderHistory();
    toast("전체 삭제됨");
  };

  // init
  renderChips();
  bind("total","val.total");
  bind("dye","val.dye");
  bind("dev","val.dev");
  renderHistory();
  if($("total").value && $("dye").value && $("dev").value) calc(false);
</script>
</body>
</html>
