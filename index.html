<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JOGUN COLOR AI</title>

<style>

body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, system-ui;
color:white;

background:
linear-gradient(120deg,#1e293b,#020617),
radial-gradient(circle at 20% 20%,#38bdf8 0%,transparent 40%),
radial-gradient(circle at 80% 80%,#22c55e 0%,transparent 40%);
min-height:100vh;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.header{
margin-bottom:20px;
}

.title{
font-size:22px;
font-weight:800;
}

.subtitle{
opacity:.7;
font-size:12px;
}

.instagram{
margin-top:8px;
display:flex;
align-items:center;
gap:8px;
font-size:14px;
cursor:pointer;
}

.card{
background:rgba(255,255,255,.06);
backdrop-filter:blur(20px);
border-radius:20px;
padding:18px;
margin-bottom:14px;
border:1px solid rgba(255,255,255,.1);
}

button{
width:100%;
padding:14px;
margin-top:8px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:600;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
}

.copy{
background:linear-gradient(135deg,#3b82f6,#2563eb);
}

.row{
display:flex;
gap:6px;
margin-top:8px;
}

.small{
flex:1;
background:rgba(255,255,255,.1);
font-size:14px;
}

input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:rgba(0,0,0,.3);
color:white;
font-size:16px;
margin-top:6px;
}

.result{
margin-top:12px;
padding:12px;
border-radius:14px;
background:rgba(255,255,255,.08);
font-family:monospace;
}

.history{
margin-top:10px;
font-size:13px;
opacity:.8;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="title">
JOGUN COLOR AI
</div>

<div class="subtitle">
Created by JOGUN
</div>

<div class="instagram"
onclick="window.open('https://instagram.com/soowan_jg')">

📸 Instagram  
<b>@soowan_jg</b>

</div>

</div>

<div class="card">

총 사용량(g)

<div class="row">

<button class="small" onclick="setTotal(60)">60</button>
<button class="small" onclick="setTotal(90)">90</button>
<button class="small" onclick="setTotal(120)">120</button>
<button class="small" onclick="setTotal(150)">150</button>

</div>

<input id="total" placeholder="직접 입력">

비율 프리셋

<div class="row">

<button class="small" onclick="setRatio(1,1)">1:1</button>
<button class="small" onclick="setRatio(1,1.5)">1:1.5</button>
<button class="small" onclick="setRatio(1,2)">1:2</button>

</div>

염모제 비율
<input id="dye" placeholder="예 1">

산화제 비율
<input id="dev" placeholder="예 1.5">

<button onclick="calc()">계산하기</button>

<button class="copy" onclick="copy()">결과 복사</button>

<div class="result" id="result">
결과
</div>

</div>

<div class="card">

최근 기록

<div id="history"></div>

</div>

</div>

<script>

let historyData=JSON.parse(localStorage.getItem("history")||"[]")

function setTotal(v){
total.value=v
}

function setRatio(a,b){
dye.value=a
dev.value=b
}

function calc(){

let t=parseFloat(total.value)
let d=parseFloat(dye.value)
let o=parseFloat(dev.value)

let r=d+o

let dg=t*(d/r)
let og=t*(o/r)

let text=`염모제 ${dg.toFixed(1)}g
산화제 ${og.toFixed(1)}g
총 ${t}g / 비율 ${d}:${o}`

result.innerText=text

historyData.unshift(text)

historyData=historyData.slice(0,5)

localStorage.setItem("history",JSON.stringify(historyData))

renderHistory()

}

function copy(){
navigator.clipboard.writeText(result.innerText)
}

function renderHistory(){

let html=""

historyData.forEach(h=>{

html+=`<div class="history">${h}</div>`

})

history.innerHTML=html

}

renderHistory()

</script>

</body>
</html>
