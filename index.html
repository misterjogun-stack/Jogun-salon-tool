<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <meta name="theme-color" content="#0f172a" />
  <meta
    name="description"
    content="모바일에 최적화된 로또 번호 추첨기 - jogun edition"
  />
  <title>jogun 로또번호 추첨기</title>
  <style>
    :root {
      --bg: #020617;
      --bg-soft: rgba(15, 23, 42, 0.72);
      --card: rgba(15, 23, 42, 0.9);
      --text: #e5eefb;
      --muted: #94a3b8;
      --line: rgba(148, 163, 184, 0.14);
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.34);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.22), transparent 30%),
        radial-gradient(circle at bottom, rgba(34, 197, 94, 0.18), transparent 30%),
        linear-gradient(180deg, #020617 0%, #08111f 100%);
      color: var(--text);
      font-family:
        "Pretendard Variable",
        "Pretendard",
        "Apple SD Gothic Neo",
        "Noto Sans KR",
        "Segoe UI",
        sans-serif;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      justify-content: center;
      padding:
        calc(14px + var(--safe-top))
        calc(14px + var(--safe-right))
        calc(18px + var(--safe-bottom))
        calc(14px + var(--safe-left));
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      width: min(100%, 480px);
      display: grid;
      gap: 14px;
    }

    .glass {
      background: var(--bg-soft);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      padding: 22px 18px 18px;
      background:
        linear-gradient(145deg, rgba(56, 189, 248, 0.18), rgba(34, 197, 94, 0.12)),
        var(--card);
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(8px);
      opacity: 0.7;
      pointer-events: none;
    }

    .hero::before {
      width: 120px;
      height: 120px;
      top: -36px;
      right: -30px;
      background: rgba(56, 189, 248, 0.25);
    }

    .hero::after {
      width: 88px;
      height: 88px;
      bottom: -24px;
      left: -18px;
      background: rgba(34, 197, 94, 0.22);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      color: #dbeafe;
      background: rgba(255, 255, 255, 0.06);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .hero h1 {
      margin: 14px 0 8px;
      font-size: clamp(28px, 7vw, 38px);
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }

    .panel {
      border-radius: var(--radius-xl);
      padding: 16px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .panel-title {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .subtle {
      color: var(--muted);
      font-size: 12px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    .select {
      appearance: none;
      width: 100%;
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 0 14px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02)),
        #0f172a;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .select:focus {
      border-color: rgba(56, 189, 248, 0.7);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .btn {
      min-height: 54px;
      border: 0;
      border-radius: 18px;
      padding: 0 16px;
      font-weight: 800;
      letter-spacing: -0.02em;
      cursor: pointer;
      transition:
        transform 0.16s ease,
        filter 0.16s ease,
        opacity 0.16s ease;
      touch-action: manipulation;
      user-select: none;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      color: #001018;
      background:
        linear-gradient(135deg, #67e8f9, #38bdf8 52%, #22c55e);
      box-shadow: 0 16px 32px rgba(34, 197, 94, 0.16);
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
    }

    .status {
      margin-top: 12px;
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
    }

    .result-card {
      border-radius: var(--radius-xl);
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .result-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.1);
      color: #bfe8ff;
      font-size: 12px;
      font-weight: 800;
    }

    .result-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .balls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .ball {
      position: relative;
      display: grid;
      place-items: center;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      font-weight: 900;
      font-size: clamp(24px, 8vw, 30px);
      letter-spacing: -0.04em;
      color: white;
      box-shadow:
        inset 0 -10px 20px rgba(0, 0, 0, 0.18),
        inset 0 8px 12px rgba(255, 255, 255, 0.16),
        0 14px 28px rgba(0, 0, 0, 0.28);
      transform: translateY(8px) scale(0.92);
      opacity: 0;
      animation: pop-in 0.6s forwards;
    }

    .ball::after {
      content: "";
      position: absolute;
      top: 14%;
      left: 18%;
      width: 34%;
      height: 20%;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.22);
      transform: rotate(-20deg);
      filter: blur(1px);
    }

    .ball[data-range="1"] { background: linear-gradient(145deg, #f59e0b, #d97706); }
    .ball[data-range="2"] { background: linear-gradient(145deg, #3b82f6, #1d4ed8); }
    .ball[data-range="3"] { background: linear-gradient(145deg, #ef4444, #b91c1c); }
    .ball[data-range="4"] { background: linear-gradient(145deg, #64748b, #334155); }
    .ball[data-range="5"] { background: linear-gradient(145deg, #22c55e, #15803d); }

    .ball:nth-child(1) { animation-delay: 0.03s; }
    .ball:nth-child(2) { animation-delay: 0.08s; }
    .ball:nth-child(3) { animation-delay: 0.13s; }
    .ball:nth-child(4) { animation-delay: 0.18s; }
    .ball:nth-child(5) { animation-delay: 0.23s; }
    .ball:nth-child(6) { animation-delay: 0.28s; }

    .insight {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .mini {
      border-radius: 18px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
    }

    .mini strong {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .mini span {
      display: block;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .history {
      display: grid;
      gap: 10px;
    }

    .history-item {
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .history-balls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      min-width: 36px;
      height: 36px;
      padding: 0 10px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 900;
      color: white;
      box-shadow: inset 0 -6px 10px rgba(0, 0, 0, 0.18);
    }

    .chip[data-range="1"] { background: linear-gradient(145deg, #f59e0b, #d97706); }
    .chip[data-range="2"] { background: linear-gradient(145deg, #3b82f6, #1d4ed8); }
    .chip[data-range="3"] { background: linear-gradient(145deg, #ef4444, #b91c1c); }
    .chip[data-range="4"] { background: linear-gradient(145deg, #64748b, #334155); }
    .chip[data-range="5"] { background: linear-gradient(145deg, #22c55e, #15803d); }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding-bottom: 4px;
    }

    @keyframes pop-in {
      0% {
        opacity: 0;
        transform: translateY(14px) scale(0.86) rotate(-8deg);
      }
      70% {
        opacity: 1;
        transform: translateY(-4px) scale(1.03) rotate(2deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0);
      }
    }

    @media (max-width: 360px) {
      .controls,
      .button-row,
      .insight {
        grid-template-columns: 1fr;
      }

      .balls {
        gap: 10px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }

      .ball {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="jogun 로또번호 추첨기">
    <section class="hero glass">
      <span class="eyebrow">✨ jogun edition · Mobile First</span>
      <h1>세상에 하나뿐인<br />로또번호 추첨기</h1>
      <p>
        손가락 한 번으로 끝나는 초고속 추첨. 모바일 화면, 터치 조작,
        가독성, 애니메이션, 저장까지 한 파일에 담았습니다.
      </p>
    </section>

    <section class="panel glass" aria-labelledby="controls-title">
      <div class="panel-header">
        <div>
          <div id="controls-title" class="panel-title">추첨 설정</div>
          <div class="subtle">국내 로또 스타일 · 1~45 중 6개 중복 없이 추첨</div>
        </div>
      </div>

      <div class="controls">
        <div class="field">
          <label for="mode">추천 방식</label>
          <select id="mode" class="select" aria-label="추천 방식">
            <option value="random">완전 랜덤</option>
            <option value="balanced">균형형 추천</option>
            <option value="spread">분산형 추천</option>
          </select>
        </div>

        <div class="field">
          <label for="sets">게임 수</label>
          <select id="sets" class="select" aria-label="게임 수">
            <option value="1">1게임</option>
            <option value="2">2게임</option>
            <option value="3" selected>3게임</option>
            <option value="4">4게임</option>
            <option value="5">5게임</option>
          </select>
        </div>
      </div>

      <div class="button-row">
        <button id="drawBtn" class="btn btn-primary" type="button">번호 뽑기</button>
        <button id="shuffleBtn" class="btn btn-secondary" type="button">다시 섞기</button>
      </div>

      <div id="status" class="status" aria-live="polite">
        준비 완료. 버튼을 눌러 최고의 번호 조합을 받아보세요.
      </div>
    </section>

    <section class="result-card glass" aria-labelledby="result-title">
      <div class="result-top">
        <div>
          <div id="result-title" class="panel-title">이번 추천 번호</div>
          <div id="drawTime" class="result-meta">아직 추첨하지 않았습니다.</div>
        </div>
        <span class="badge" id="resultBadge">대기 중</span>
      </div>

      <div id="resultsContainer" class="history" aria-live="polite"></div>

      <div class="insight">
        <div class="mini">
          <strong>합계</strong>
          <span id="sumValue">-</span>
        </div>
        <div class="mini">
          <strong>홀/짝</strong>
          <span id="oddEvenValue">-</span>
        </div>
        <div class="mini">
          <strong>번호 간격</strong>
          <span id="gapValue">-</span>
        </div>
      </div>
    </section>

    <section class="panel glass" aria-labelledby="history-title">
      <div class="panel-header">
        <div>
          <div id="history-title" class="panel-title">최근 추첨 기록</div>
          <div class="subtle">기기 안에 최대 10개까지 저장됩니다.</div>
        </div>
        <button
          id="clearBtn"
          class="btn btn-secondary"
          type="button"
          style="min-height: 42px; padding: 0 14px;"
        >
          기록 삭제
        </button>
      </div>
      <div id="historyList" class="history"></div>
    </section>

    <div class="footer-note">
      결과는 재미용 추천입니다. 실제 당첨을 보장하지 않습니다.
    </div>
  </main>

  <script>
    const STORAGE_KEY = "jogun-lotto-history-v1";

    const modeEl = document.getElementById("mode");
    const setsEl = document.getElementById("sets");
    const drawBtn = document.getElementById("drawBtn");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusEl = document.getElementById("status");
    const drawTimeEl = document.getElementById("drawTime");
    const resultBadgeEl = document.getElementById("resultBadge");
    const resultsContainerEl = document.getElementById("resultsContainer");
    const historyListEl = document.getElementById("historyList");
    const sumValueEl = document.getElementById("sumValue");
    const oddEvenValueEl = document.getElementById("oddEvenValue");
    const gapValueEl = document.getElementById("gapValue");

    function getRangeBucket(value) {
      if (value <= 10) return "1";
      if (value <= 20) return "2";
      if (value <= 30) return "3";
      if (value <= 40) return "4";
      return "5";
    }

    function formatDate(date = new Date()) {
      return new Intl.DateTimeFormat("ko-KR", {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(date);
    }

    function saveHistory(history) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(0, 10)));
    }

    function loadHistory() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function uniqueRandomNumbers(count = 6, min = 1, max = 45) {
      const values = new Set();

      while (values.size < count) {
        values.add(Math.floor(Math.random() * (max - min + 1)) + min);
      }

      return [...values].sort((a, b) => a - b);
    }

    function pickFromRange(start, end) {
      return Math.floor(Math.random() * (end - start + 1)) + start;
    }

    function createBalancedNumbers() {
      const ranges = [
        [1, 9],
        [10, 17],
        [18, 25],
        [26, 33],
        [34, 41],
        [42, 45]
      ];
      const values = new Set();

      for (const [start, end] of ranges) {
        let number = pickFromRange(start, end);

        while (values.has(number)) {
          number = pickFromRange(start, end);
        }

        values.add(number);
      }

      return [...values].sort((a, b) => a - b);
    }

    function createSpreadNumbers() {
      const anchors = [3, 11, 19, 27, 35, 43];
      const values = new Set();

      for (const anchor of anchors) {
        const min = Math.max(1, anchor - 3);
        const max = Math.min(45, anchor + 3);
        let number = pickFromRange(min, max);

        while (values.has(number)) {
          number = pickFromRange(min, max);
        }

        values.add(number);
      }

      return [...values].sort((a, b) => a - b);
    }

    function generateNumbers(mode) {
      switch (mode) {
        case "balanced":
          return createBalancedNumbers();
        case "spread":
          return createSpreadNumbers();
        default:
          return uniqueRandomNumbers();
      }
    }

    function calculateInsight(numbers) {
      const sum = numbers.reduce((accumulator, current) => accumulator + current, 0);
      const odd = numbers.filter((number) => number % 2 !== 0).length;
      const even = numbers.length - odd;
      const gaps = numbers.slice(1).map((number, index) => number - numbers[index]);
      const averageGap = gaps.length
        ? (gaps.reduce((accumulator, current) => accumulator + current, 0) / gaps.length).toFixed(1)
        : "0.0";

      return {
        sum,
        oddEven: `${odd}:${even}`,
        averageGap
      };
    }

    function createBall(number) {
      const element = document.createElement("div");
      element.className = "ball";
      element.dataset.range = getRangeBucket(number);
      element.textContent = number;
      element.setAttribute("aria-label", `${number}번`);
      return element;
    }

    function createChip(number) {
      const element = document.createElement("span");
      element.className = "chip";
      element.dataset.range = getRangeBucket(number);
      element.textContent = number;
      element.setAttribute("aria-label", `${number}번`);
      return element;
    }

    function renderCurrentResults(games) {
      resultsContainerEl.innerHTML = "";

      games.forEach((numbers, index) => {
        const wrapper = document.createElement("article");
        wrapper.className = "history-item";

        const header = document.createElement("div");
        header.className = "history-head";
        header.innerHTML = `
          <strong style="color: var(--text); font-size: 14px;">게임 ${index + 1}</strong>
          <span>${numbers.join(" · ")}</span>
        `;

        const balls = document.createElement("div");
        balls.className = "balls";

        numbers.forEach((number) => {
          balls.appendChild(createBall(number));
        });

        wrapper.append(header, balls);
        resultsContainerEl.appendChild(wrapper);
      });

      const insight = calculateInsight(games[0]);
      sumValueEl.textContent = String(insight.sum);
      oddEvenValueEl.textContent = insight.oddEven;
      gapValueEl.textContent = insight.averageGap;
    }

    function renderHistory() {
      const history = loadHistory();

      if (history.length === 0) {
        historyListEl.innerHTML = `
          <div class="history-item">
            <div class="subtle">아직 저장된 기록이 없습니다. 첫 추첨을 시작해보세요.</div>
          </div>
        `;
        return;
      }

      historyListEl.innerHTML = "";

      history.forEach((entry) => {
        const item = document.createElement("article");
        item.className = "history-item";

        const head = document.createElement("div");
        head.className = "history-head";
        head.innerHTML = `
          <span>${entry.modeLabel} · ${entry.games.length}게임</span>
          <span>${entry.createdAt}</span>
        `;

        const content = document.createElement("div");
        content.className = "history";

        entry.games.forEach((numbers, index) => {
          const row = document.createElement("div");
          row.className = "history-balls";
          row.setAttribute("aria-label", `최근 기록 게임 ${index + 1}`);

          const label = document.createElement("strong");
          label.textContent = `G${index + 1}`;
          label.style.minWidth = "26px";
          label.style.display = "inline-flex";
          label.style.alignItems = "center";
          label.style.color = "var(--muted)";

          row.appendChild(label);

          numbers.forEach((number) => {
            row.appendChild(createChip(number));
          });

          content.appendChild(row);
        });

        item.append(head, content);
        historyListEl.appendChild(item);
      });
    }

    function getModeLabel(mode) {
      if (mode === "balanced") return "균형형";
      if (mode === "spread") return "분산형";
      return "완전 랜덤";
    }

    function drawNumbers() {
      const mode = modeEl.value;
      const sets = Number(setsEl.value);
      const games = Array.from({ length: sets }, () => generateNumbers(mode));
      const createdAt = formatDate();

      renderCurrentResults(games);
      drawTimeEl.textContent = `${createdAt} 추첨 완료`;
      resultBadgeEl.textContent = `${getModeLabel(mode)} · ${sets}게임`;
      statusEl.textContent = `최고의 조합 ${sets}게임을 생성했습니다.`;

      const history = loadHistory();
      history.unshift({
        mode,
        modeLabel: getModeLabel(mode),
        games,
        createdAt
      });

      saveHistory(history);
      renderHistory();

      if (navigator.vibrate) {
        navigator.vibrate([20, 30, 20]);
      }
    }

    drawBtn.addEventListener("click", drawNumbers);
    shuffleBtn.addEventListener("click", drawNumbers);

    clearBtn.addEventListener("click", () => {
      localStorage.removeItem(STORAGE_KEY);
      renderHistory();
      statusEl.textContent = "최근 추첨 기록을 모두 삭제했습니다.";
    });

    window.addEventListener("load", () => {
      renderHistory();
      const initial = [generateNumbers("random")];
      renderCurrentResults(initial);
      drawTimeEl.textContent = "기본 미리보기 표시 중";
      resultBadgeEl.textContent = "미리보기";
    });
  </script>
</body>
</html>
