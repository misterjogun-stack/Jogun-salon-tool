<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>로또 추첨기</title>
    <style>
      :root {
        --bg-1: #07111f;
        --bg-2: #0f172a;
        --bg-3: #1e293b;
        --card: rgba(8, 15, 30, 0.8);
        --card-soft: rgba(255, 255, 255, 0.04);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --accent-2: #2563eb;
        --success: #22c55e;
        --border: rgba(148, 163, 184, 0.16);
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.38);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 18px;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 26%),
          radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.18), transparent 24%),
          linear-gradient(180deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
        padding: max(16px, env(safe-area-inset-top)) 14px max(28px, env(safe-area-inset-bottom));
      }

      .app-shell {
        width: min(980px, 100%);
        margin: 0 auto;
      }

      .app {
        display: grid;
        gap: 16px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        backdrop-filter: blur(20px);
      }

      .hero {
        padding: 20px;
        display: grid;
        gap: 16px;
      }

      .title-wrap {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .title-copy {
        display: grid;
        gap: 6px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 7vw, 3.2rem);
        line-height: 1.04;
        letter-spacing: -0.03em;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 42px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(56, 189, 248, 0.12);
        border: 1px solid rgba(56, 189, 248, 0.22);
        color: #d7f3ff;
        font-size: 0.92rem;
        font-weight: 800;
        white-space: nowrap;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .panel {
        padding: 16px;
        border-radius: var(--radius-lg);
        border: 1px solid var(--border);
        background: var(--card-soft);
      }

      .panel label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      select,
      input {
        width: 100%;
        min-height: 48px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 14px;
        padding: 12px 14px;
        background: rgba(2, 6, 23, 0.72);
        color: var(--text);
        font-size: 16px;
        outline: none;
        appearance: none;
      }

      select:focus,
      input:focus {
        border-color: rgba(56, 189, 248, 0.55);
        box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.12);
      }

      .actions {
        display: grid;
        grid-template-columns: 1.25fr 1fr 1fr;
        gap: 10px;
      }

      button {
        min-height: 50px;
        border: 0;
        cursor: pointer;
        border-radius: 16px;
        padding: 14px 16px;
        font-size: 0.98rem;
        font-weight: 900;
        transition: transform 0.16s ease, opacity 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
      }

      button:hover {
        filter: brightness(1.04);
      }

      button:active {
        transform: scale(0.985);
      }

      .primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: white;
        box-shadow: 0 14px 30px rgba(37, 99, 235, 0.34);
      }

      .secondary {
        background: rgba(148, 163, 184, 0.12);
        color: var(--text);
        border: 1px solid rgba(148, 163, 184, 0.18);
      }

      .result-card,
      .history {
        padding: 20px;
      }

      .machine-wrap {
        display: grid;
        justify-items: center;
        gap: 12px;
        padding: 4px 0 10px;
      }

      .machine-stage {
        position: relative;
        width: min(380px, 100%);
        height: min(440px, 96vw);
        display: grid;
        place-items: center;
      }

      .machine-glow {
        position: absolute;
        inset: auto 50% 18px auto;
        width: 220px;
        height: 40px;
        transform: translateX(50%);
        background: radial-gradient(circle, rgba(56, 189, 248, 0.28), transparent 70%);
        filter: blur(10px);
      }

      .machine {
        position: relative;
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
      }

      .machine-top {
        position: absolute;
        top: 16px;
        width: min(270px, 72vw);
        height: min(270px, 72vw);
        border-radius: 50%;
        overflow: hidden;
        background:
          radial-gradient(circle at 30% 28%, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0.08) 22%, rgba(56, 189, 248, 0.06) 52%, rgba(2, 6, 23, 0.28) 74%),
          rgba(255, 255, 255, 0.07);
        border: 10px solid rgba(148, 163, 184, 0.24);
        box-shadow:
          inset 0 12px 40px rgba(255, 255, 255, 0.06),
          inset 0 -18px 30px rgba(15, 23, 42, 0.32),
          0 24px 46px rgba(0, 0, 0, 0.3);
      }

      .machine-top::before {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.16);
      }

      .machine-reflection {
        position: absolute;
        top: 24px;
        left: 36px;
        width: 82px;
        height: 150px;
        border-radius: 50%;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.3), transparent 72%);
        transform: rotate(-14deg);
        filter: blur(2px);
      }

      .machine-core {
        position: absolute;
        inset: 0;
        animation: bowlFloat 3.2s ease-in-out infinite;
      }

      .machine-mini-ball {
        position: absolute;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 0.8rem;
        font-weight: 900;
        color: white;
        box-shadow: inset 0 -6px 10px rgba(0, 0, 0, 0.2), 0 10px 16px rgba(0, 0, 0, 0.24);
        animation: swirl 4.3s linear infinite;
      }

      .machine-mini-ball::after,
      .ball::after,
      .mini-ball::after,
      .output-ball::after {
        content: "";
        position: absolute;
        top: 7px;
        left: 9px;
        width: 35%;
        height: 22%;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.42);
        filter: blur(1px);
      }

      .machine-mini-ball:nth-child(1) { top: 36px; left: 28px; animation-duration: 3.2s; }
      .machine-mini-ball:nth-child(2) { top: 56px; right: 32px; animation-duration: 4.6s; }
      .machine-mini-ball:nth-child(3) { top: 108px; left: 50px; animation-duration: 4s; }
      .machine-mini-ball:nth-child(4) { top: 132px; right: 46px; animation-duration: 4.9s; }
      .machine-mini-ball:nth-child(5) { bottom: 44px; left: 68px; animation-duration: 3.6s; }
      .machine-mini-ball:nth-child(6) { bottom: 34px; right: 60px; animation-duration: 4.2s; }
      .machine-mini-ball:nth-child(7) { top: 86px; left: 104px; animation-duration: 5.1s; }
      .machine-mini-ball:nth-child(8) { bottom: 82px; right: 102px; animation-duration: 3.8s; }

      .machine-neck {
        position: absolute;
        top: calc(16px + min(270px, 72vw) - 8px);
        width: 76px;
        height: 112px;
        border-radius: 0 0 24px 24px;
        background: linear-gradient(180deg, rgba(203, 213, 225, 0.95), rgba(71, 85, 105, 0.96));
        box-shadow: inset 0 8px 16px rgba(255, 255, 255, 0.2), inset 0 -8px 16px rgba(15, 23, 42, 0.26);
      }

      .machine-neck::after {
        content: "";
        position: absolute;
        inset: 8px 14px 12px;
        border-radius: 0 0 14px 14px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.2), rgba(15, 23, 42, 0.12));
      }

      .machine-output {
        position: absolute;
        top: calc(16px + min(270px, 72vw) + 84px);
        width: 136px;
        height: 16px;
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(2, 6, 23, 0.95), rgba(30, 41, 59, 0.92));
        border: 1px solid rgba(148, 163, 184, 0.16);
      }

      .machine-base {
        position: absolute;
        bottom: 42px;
        width: min(260px, 78vw);
        height: 94px;
        border-radius: 24px;
        background: linear-gradient(180deg, #334155, #111827);
        border: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow: inset 0 10px 24px rgba(255, 255, 255, 0.06), 0 20px 36px rgba(0, 0, 0, 0.32);
      }

      .machine-base::before {
        content: "";
        position: absolute;
        inset: 12px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .machine-lights {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
      }

      .machine-light {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(148, 163, 184, 0.35);
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
      }

      .machine-light.active {
        background: #67e8f9;
        box-shadow: 0 0 16px rgba(103, 232, 249, 0.8);
      }

      .machine-ball-tray {
        position: absolute;
        bottom: 118px;
        width: 164px;
        height: 62px;
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(2, 6, 23, 0.95), rgba(30, 41, 59, 0.9));
        border: 1px solid rgba(148, 163, 184, 0.14);
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .output-ball {
        position: absolute;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: white;
        font-size: 1.05rem;
        font-weight: 900;
        box-shadow: inset 0 -8px 10px rgba(0, 0, 0, 0.22), 0 10px 22px rgba(0, 0, 0, 0.34);
        opacity: 0;
        transform: translateY(-80px) scale(0.6);
      }

      .output-ball.show {
        animation: dropBall 0.75s cubic-bezier(0.2, 0.9, 0.2, 1) forwards;
      }

      .machine-caption {
        color: var(--muted);
        font-size: 0.92rem;
        text-align: center;
      }

      .result-grid {
        display: grid;
        gap: 12px;
      }

      .balls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        min-height: 68px;
      }

      .ball,
      .mini-ball,
      .output-ball,
      .machine-mini-ball {
        position: relative;
      }

      .ball {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1.28rem;
        font-weight: 900;
        color: white;
        box-shadow: inset 0 -8px 10px rgba(0, 0, 0, 0.18), 0 12px 24px rgba(15, 23, 42, 0.32);
        transform: scale(0.6);
        opacity: 0;
        animation: pop 0.42s ease forwards;
      }

      .ball.placeholder {
        background: rgba(148, 163, 184, 0.12);
        color: transparent;
        border: 1px dashed rgba(148, 163, 184, 0.22);
        box-shadow: none;
      }

      .ball:nth-child(1) { animation-delay: 0.02s; }
      .ball:nth-child(2) { animation-delay: 0.08s; }
      .ball:nth-child(3) { animation-delay: 0.14s; }
      .ball:nth-child(4) { animation-delay: 0.2s; }
      .ball:nth-child(5) { animation-delay: 0.26s; }
      .ball:nth-child(6) { animation-delay: 0.32s; }

      .range-1 { background: linear-gradient(135deg, #f59e0b, #f97316); }
      .range-2 { background: linear-gradient(135deg, #38bdf8, #2563eb); }
      .range-3 { background: linear-gradient(135deg, #f43f5e, #e11d48); }
      .range-4 { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
      .range-5 { background: linear-gradient(135deg, #22c55e, #16a34a); }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        color: var(--muted);
      }

      .meta-chip {
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        font-size: 0.9rem;
      }

      .history-list {
        display: grid;
        gap: 10px;
      }

      .history-item {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 14px;
        background: rgba(255, 255, 255, 0.03);
      }

      .history-item .numbers {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .mini-ball {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.82rem;
        font-weight: 900;
        color: white;
        box-shadow: inset 0 -5px 8px rgba(0, 0, 0, 0.16), 0 8px 12px rgba(0, 0, 0, 0.18);
      }

      .empty {
        color: var(--muted);
        padding: 20px 0 4px;
      }

      .footer {
        margin-top: 14px;
        padding-bottom: max(8px, env(safe-area-inset-bottom));
      }

      .credit {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .insta {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      @keyframes bowlFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-4px);
        }
      }

      @keyframes swirl {
        0% {
          transform: translate(0, 0) scale(1) rotate(0deg);
        }
        25% {
          transform: translate(12px, -8px) scale(1.04) rotate(90deg);
        }
        50% {
          transform: translate(-10px, 12px) scale(0.98) rotate(180deg);
        }
        75% {
          transform: translate(14px, 4px) scale(1.02) rotate(270deg);
        }
        100% {
          transform: translate(0, 0) scale(1) rotate(360deg);
        }
      }

      @keyframes pop {
        0% {
          opacity: 0;
          transform: scale(0.6) translateY(12px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      @keyframes dropBall {
        0% {
          opacity: 0;
          transform: translateY(-84px) scale(0.58);
        }
        55% {
          opacity: 1;
          transform: translateY(6px) scale(1.02);
        }
        72% {
          opacity: 1;
          transform: translateY(-10px) scale(0.98);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @media (max-width: 760px) {
        body {
          padding-left: 12px;
          padding-right: 12px;
        }

        .hero,
        .result-card,
        .history {
          padding: 16px;
        }

        .title-wrap {
          align-items: flex-start;
          flex-direction: column;
        }

        .badge {
          width: 100%;
        }

        .controls,
        .actions {
          grid-template-columns: 1fr;
        }

        .machine-stage {
          height: min(410px, 108vw);
        }

        .balls {
          gap: 10px;
          justify-content: center;
        }

        .ball {
          width: 54px;
          height: 54px;
          font-size: 1.1rem;
        }

        .history-item {
          flex-direction: column;
          align-items: flex-start;
        }
      }

      @media (max-width: 420px) {
        h1 {
          font-size: 1.65rem;
        }

        .panel {
          padding: 14px;
        }

        .machine-mini-ball {
          width: 36px;
          height: 36px;
          font-size: 0.76rem;
        }

        .output-ball {
          width: 48px;
          height: 48px;
          font-size: 1rem;
        }

        .meta {
          gap: 6px;
        }

        .meta-chip {
          font-size: 0.84rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <main class="app">
        <section class="card hero">
          <div class="title-wrap">
            <div class="title-copy">
              <h1>✨ 로또 추첨기</h1>
              <p class="subtitle">모바일에 맞춘 리얼 추첨 애니메이션</p>
            </div>
            <div class="badge">🎲 Real Draw Mode</div>
          </div>

          <div class="controls">
            <div class="panel">
              <label for="setCount">생성 세트 수</label>
              <select id="setCount">
                <option value="1">1세트</option>
                <option value="3">3세트</option>
                <option value="5">5세트</option>
              </select>
            </div>

            <div class="panel">
              <label for="maxNumber">최대 번호</label>
              <select id="maxNumber">
                <option value="45">45</option>
                <option value="49">49</option>
                <option value="60">60</option>
              </select>
            </div>

            <div class="panel">
              <label for="excludeNumbers">제외 번호</label>
              <input id="excludeNumbers" type="text" placeholder="예: 3, 7, 12" />
            </div>
          </div>

          <div class="actions">
            <button id="drawButton" class="primary">번호 뽑기</button>
            <button id="shuffleButton" class="secondary">다시 섞기</button>
            <button id="resetButton" class="secondary">기록 초기화</button>
          </div>
        </section>

        <section class="card result-card">
          <div>
            <p class="subtitle">이번 추천 번호</p>
            <div class="machine-wrap">
              <div class="machine-stage">
                <div class="machine-glow"></div>
                <div class="machine" aria-hidden="true">
                  <div class="machine-top">
                    <div class="machine-reflection"></div>
                    <div class="machine-core" id="machineCore">
                      <span class="machine-mini-ball range-1">7</span>
                      <span class="machine-mini-ball range-2">14</span>
                      <span class="machine-mini-ball range-3">27</span>
                      <span class="machine-mini-ball range-4">33</span>
                      <span class="machine-mini-ball range-5">41</span>
                      <span class="machine-mini-ball range-1">9</span>
                      <span class="machine-mini-ball range-2">18</span>
                      <span class="machine-mini-ball range-5">44</span>
                    </div>
                  </div>
                  <div class="machine-neck"></div>
                  <div class="machine-output"></div>
                  <div class="machine-ball-tray">
                    <div id="outputBall" class="output-ball"></div>
                  </div>
                  <div class="machine-base">
                    <div class="machine-lights">
                      <span class="machine-light" data-light></span>
                      <span class="machine-light" data-light></span>
                      <span class="machine-light" data-light></span>
                    </div>
                  </div>
                </div>
              </div>
              <div id="machineCaption" class="machine-caption">추첨 버튼을 누르면 공이 내려오고 번호가 한 개씩 공개됩니다.</div>
            </div>
            <div id="resultSets" class="result-grid"></div>
          </div>
        </section>

        <section class="card history">
          <div style="display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; flex-wrap: wrap;">
            <div>
              <p class="subtitle">최근 생성 기록</p>
              <h2 style="margin: 4px 0 0; font-size: 1.3rem;">히스토리</h2>
            </div>
          </div>
          <div id="historyList" class="history-list"></div>
        </section>
      </main>

      <footer class="footer">
        <div class="credit">
          <span>만든사람: jogun</span>
          <span class="insta">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
              <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 2A3.75 3.75 0 0 0 4 7.75v8.5A3.75 3.75 0 0 0 7.75 20h8.5A3.75 3.75 0 0 0 20 16.25v-8.5A3.75 3.75 0 0 0 16.25 4h-8.5Zm9.25 1.75a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z"/>
            </svg>
            <span>soowan@jg</span>
          </span>
        </div>
      </footer>
    </div>

    <script>
      const drawButton = document.getElementById("drawButton");
      const shuffleButton = document.getElementById("shuffleButton");
      const resetButton = document.getElementById("resetButton");
      const setCountSelect = document.getElementById("setCount");
      const maxNumberSelect = document.getElementById("maxNumber");
      const excludeNumbersInput = document.getElementById("excludeNumbers");
      const resultSets = document.getElementById("resultSets");
      const historyList = document.getElementById("historyList");
      const outputBall = document.getElementById("outputBall");
      const machineCaption = document.getElementById("machineCaption");
      const machineLights = Array.from(document.querySelectorAll("[data-light]"));

      let drawRevealTimer = null;
      let machineLightTimer = null;
      let latestDraw = [];
      let drawHistory = [];
      let activeSetMeta = { maxNumber: 45, excludedCount: 0 };

      function parseExcludedNumbers(rawValue, maxNumber) {
        if (!rawValue.trim()) {
          return new Set();
        }

        return new Set(
          rawValue
            .split(",")
            .map((value) => Number(value.trim()))
            .filter((value) => Number.isInteger(value) && value >= 1 && value <= maxNumber)
        );
      }

      function shuffle(array) {
        const copied = [...array];

        for (let index = copied.length - 1; index > 0; index -= 1) {
          const randomIndex = Math.floor(Math.random() * (index + 1));
          [copied[index], copied[randomIndex]] = [copied[randomIndex], copied[index]];
        }

        return copied;
      }

      function getBallClass(number) {
        if (number <= 10) return "range-1";
        if (number <= 20) return "range-2";
        if (number <= 30) return "range-3";
        if (number <= 40) return "range-4";
        return "range-5";
      }

      function createNumberSet(maxNumber, excludedNumbers) {
        const availableNumbers = [];

        for (let number = 1; number <= maxNumber; number += 1) {
          if (!excludedNumbers.has(number)) {
            availableNumbers.push(number);
          }
        }

        if (availableNumbers.length < 6) {
          throw new Error("번호를 6개 이상 남겨야 추첨할 수 있어요.");
        }

        return shuffle(availableNumbers)
          .slice(0, 6)
          .sort((left, right) => left - right);
      }

      function formatTime() {
        return new Date().toLocaleString("ko-KR", {
          hour12: false,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });
      }

      function renderSetCard(set, index, maxNumber, excludedCount, revealCount = set.length) {
        const balls = set
          .map((number, ballIndex) => {
            if (ballIndex >= revealCount) {
              return '<span class="ball placeholder">0</span>';
            }

            return `<span class="ball ${getBallClass(number)}">${number}</span>`;
          })
          .join("");

        return `
          <article class="panel">
            <div style="display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 12px;">
              <strong style="font-size: 1.06rem;">추천 세트 ${index + 1}</strong>
              <div class="meta">
                <span class="meta-chip">최대 번호 ${maxNumber}</span>
                <span class="meta-chip">제외 번호 ${excludedCount}개</span>
              </div>
            </div>
            <div class="balls">${balls}</div>
          </article>
        `;
      }

      function renderResult(sets, maxNumber, excludedCount, revealCount = 6) {
        if (!sets.length) {
          resultSets.innerHTML = '<p class="empty">아직 생성된 번호가 없어요.</p>';
          return;
        }

        resultSets.innerHTML = sets
          .map((set, index) => renderSetCard(set, index, maxNumber, excludedCount, revealCount))
          .join("");
      }

      function resetOutputBall() {
        outputBall.className = "output-ball";
        outputBall.textContent = "";
      }

      function showOutputBall(number) {
        resetOutputBall();
        outputBall.textContent = number;
        outputBall.classList.add(getBallClass(number), "show");
      }

      function startMachineLights() {
        stopMachineLights();
        let activeIndex = 0;

        machineLightTimer = setInterval(() => {
          machineLights.forEach((light, index) => {
            light.classList.toggle("active", index === activeIndex);
          });
          activeIndex = (activeIndex + 1) % machineLights.length;
        }, 160);
      }

      function stopMachineLights() {
        if (machineLightTimer) {
          clearInterval(machineLightTimer);
          machineLightTimer = null;
        }

        machineLights.forEach((light) => light.classList.remove("active"));
      }

      function animateDrawResult(sets, maxNumber, excludedCount) {
        let revealCount = 0;
        const leadSet = sets[0] ?? [];

        if (drawRevealTimer) {
          clearInterval(drawRevealTimer);
        }

        resetOutputBall();
        startMachineLights();
        machineCaption.textContent = "공이 회전 중입니다...";
        renderResult(sets, maxNumber, excludedCount, revealCount);

        drawRevealTimer = setInterval(() => {
          const nextNumber = leadSet[revealCount];

          if (typeof nextNumber === "number") {
            showOutputBall(nextNumber);
          }

          revealCount += 1;
          renderResult(sets, maxNumber, excludedCount, revealCount);
          machineCaption.textContent = `${revealCount}번째 공이 나왔습니다.`;

          if (revealCount >= 6) {
            clearInterval(drawRevealTimer);
            drawRevealTimer = null;
            stopMachineLights();
            machineCaption.textContent = "추첨 완료. 아래 번호를 확인해보세요.";
          }
        }, 680);
      }

      function renderHistory() {
        if (!drawHistory.length) {
          historyList.innerHTML = '<p class="empty">히스토리가 비어 있어요.</p>';
          return;
        }

        historyList.innerHTML = drawHistory
          .map((entry) => {
            const numbersMarkup = entry.sets
              .map(
                (set) => `
                  <div class="numbers">
                    ${set
                      .map((number) => `<span class="mini-ball ${getBallClass(number)}">${number}</span>`)
                      .join("")}
                  </div>
                `
              )
              .join("");

            return `
              <div class="history-item">
                <div>
                  <strong>${entry.time}</strong>
                  <div class="subtitle" style="margin-top: 6px;">${entry.sets.length}세트 · 최대 ${entry.maxNumber} · 제외 ${entry.excludedCount}개</div>
                </div>
                <div style="display: grid; gap: 8px;">${numbersMarkup}</div>
              </div>
            `;
          })
          .join("");
      }

      function drawNumbers() {
        try {
          const setCount = Number(setCountSelect.value);
          const maxNumber = Number(maxNumberSelect.value);
          const excludedNumbers = parseExcludedNumbers(excludeNumbersInput.value, maxNumber);
          const sets = Array.from({ length: setCount }, () => createNumberSet(maxNumber, excludedNumbers));

          latestDraw = sets;
          activeSetMeta = { maxNumber, excludedCount: excludedNumbers.size };
          drawHistory = [
            {
              time: formatTime(),
              sets,
              maxNumber,
              excludedCount: excludedNumbers.size
            },
            ...drawHistory
          ].slice(0, 10);

          animateDrawResult(sets, maxNumber, excludedNumbers.size);
          renderHistory();
        } catch (error) {
          alert(error.message);
        }
      }

      function reshuffleLatest() {
        drawNumbers();
      }

      function resetHistory() {
        if (drawRevealTimer) {
          clearInterval(drawRevealTimer);
          drawRevealTimer = null;
        }

        stopMachineLights();
        latestDraw = [];
        drawHistory = [];
        resetOutputBall();
        machineCaption.textContent = "추첨 버튼을 누르면 공이 내려오고 번호가 한 개씩 공개됩니다.";
        renderResult([], activeSetMeta.maxNumber, activeSetMeta.excludedCount);
        renderHistory();
      }

      drawButton.addEventListener("click", drawNumbers);
      shuffleButton.addEventListener("click", reshuffleLatest);
      resetButton.addEventListener("click", resetHistory);

      renderResult([], activeSetMeta.maxNumber, activeSetMeta.excludedCount);
      renderHistory();
    </script>
  </body>
</html>
