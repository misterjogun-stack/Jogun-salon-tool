<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOGUN LOTTO UNIVERSE - 로또번호 생성기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;500;700;900&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --gold: #FFD700;
    --gold-dark: #B8860B;
    --red: #e63329;
    --bg: #000000;
    --surface: #0a0a0a;
  }

  body {
    background: var(--bg);
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* === PARTICLE CANVAS === */
  #particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* === AMBIENT GLOW === */
  .ambient-glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    filter: blur(200px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }
  .glow-1 { background: var(--gold); top: -200px; left: -100px; }
  .glow-2 { background: var(--red); bottom: -200px; right: -100px; }
  .glow-3 { background: #4a00e0; top: 50%; left: 50%; transform: translate(-50%,-50%); opacity: 0.08; }

  /* === MAIN CONTAINER === */
  .container {
    position: relative;
    z-index: 1;
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* === HEADER === */
  .logo {
    text-align: center;
    margin-bottom: 10px;
    animation: fadeInDown 1s ease;
  }
  .logo-sub {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 12px;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 8px;
  }
  .logo-main {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold) 0%, #fff 40%, var(--gold) 60%, var(--gold-dark) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 30px rgba(255,215,0,0.3));
    line-height: 1.1;
  }
  .logo-tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    margin-top: 8px;
    letter-spacing: 2px;
  }

  /* === SEPARATOR === */
  .separator {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 25px auto;
    animation: fadeIn 1.5s ease;
  }

  /* === BALL DISPLAY === */
  .ball-stage {
    perspective: 1000px;
    margin: 20px 0 30px;
    min-height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .balls-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    align-items: center;
  }

  .ball-wrapper {
    opacity: 0;
    transform: translateY(80px) scale(0);
    transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .ball-wrapper.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .ball-wrapper.bounce {
    animation: ballBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .ball {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: #fff;
    position: relative;
    cursor: default;
    box-shadow:
      inset -8px -8px 20px rgba(0,0,0,0.5),
      inset 4px 4px 10px rgba(255,255,255,0.3),
      0 8px 32px rgba(0,0,0,0.6),
      0 0 20px var(--ball-glow);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  .ball::before {
    content: '';
    position: absolute;
    top: 10px;
    left: 18px;
    width: 20px;
    height: 12px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    filter: blur(4px);
    transform: rotate(-30deg);
  }
  .ball:hover {
    transform: scale(1.15) rotateY(15deg);
    box-shadow:
      inset -8px -8px 20px rgba(0,0,0,0.5),
      inset 4px 4px 10px rgba(255,255,255,0.3),
      0 12px 48px rgba(0,0,0,0.6),
      0 0 40px var(--ball-glow);
  }

  .ball.range-1 { background: linear-gradient(135deg, #FFD700, #FFA500); --ball-glow: rgba(255,215,0,0.5); }
  .ball.range-2 { background: linear-gradient(135deg, #4facfe, #00f2fe); --ball-glow: rgba(79,172,254,0.5); }
  .ball.range-3 { background: linear-gradient(135deg, #e63329, #ff6b6b); --ball-glow: rgba(230,51,41,0.5); }
  .ball.range-4 { background: linear-gradient(135deg, #a855f7, #6366f1); --ball-glow: rgba(168,85,247,0.5); }
  .ball.range-5 { background: linear-gradient(135deg, #22c55e, #10b981); --ball-glow: rgba(34,197,94,0.5); }

  .plus-sign {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    color: var(--gold);
    opacity: 0;
    transform: scale(0);
    transition: all 0.4s ease 0.3s;
    margin: 0 4px;
  }
  .plus-sign.visible {
    opacity: 0.6;
    transform: scale(1);
  }

  .ball.bonus {
    border: 3px solid var(--gold);
    animation: bonusPulse 2s ease-in-out infinite;
  }

  /* === PLACEHOLDER === */
  .placeholder-balls {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    align-items: center;
  }
  .placeholder-ball {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.03);
    border: 2px dashed rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    color: rgba(255,255,255,0.15);
  }

  /* === GENERATE BUTTON === */
  .btn-generate {
    position: relative;
    padding: 18px 60px;
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #000;
    background: linear-gradient(135deg, var(--gold) 0%, #fff 50%, var(--gold) 100%);
    background-size: 200% 200%;
    border: none;
    border-radius: 60px;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.4s ease;
    box-shadow:
      0 4px 20px rgba(255,215,0,0.3),
      0 0 60px rgba(255,215,0,0.1);
    animation: shimmer 3s linear infinite, fadeInUp 1s ease 0.3s both;
    margin-bottom: 20px;
  }
  .btn-generate:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow:
      0 8px 40px rgba(255,215,0,0.5),
      0 0 80px rgba(255,215,0,0.2);
  }
  .btn-generate:active {
    transform: translateY(0) scale(0.98);
  }
  .btn-generate.spinning {
    pointer-events: none;
    animation: shimmer 0.5s linear infinite;
  }

  /* === OPTIONS === */
  .options-row {
    display: flex;
    gap: 12px;
    margin-bottom: 30px;
    animation: fadeInUp 1s ease 0.5s both;
    flex-wrap: wrap;
    justify-content: center;
  }
  .option-btn {
    padding: 10px 22px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 1px;
  }
  .option-btn:hover {
    color: var(--gold);
    border-color: rgba(255,215,0,0.3);
    background: rgba(255,215,0,0.05);
  }
  .option-btn.active {
    color: #000;
    background: linear-gradient(135deg, var(--gold), #FFA500);
    border-color: transparent;
    box-shadow: 0 0 20px rgba(255,215,0,0.3);
  }

  /* === HISTORY === */
  .history-section {
    width: 100%;
    margin-top: 30px;
    animation: fadeInUp 1s ease 0.7s both;
  }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }
  .history-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }
  .history-clear {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    cursor: pointer;
    border: none;
    background: none;
    font-family: 'Noto Sans KR', sans-serif;
    transition: color 0.3s ease;
    letter-spacing: 1px;
  }
  .history-clear:hover { color: var(--red); }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 300px;
    overflow-y: auto;
    padding-right: 8px;
  }
  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .history-list::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.2); border-radius: 4px; }

  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 12px;
    transition: all 0.3s ease;
    animation: slideIn 0.4s ease;
  }
  .history-item:hover {
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,215,0,0.1);
  }
  .history-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    min-width: 24px;
  }
  .history-balls {
    display: flex;
    gap: 6px;
    flex: 1;
    flex-wrap: wrap;
  }
  .history-ball {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }
  .history-ball.range-1 { background: linear-gradient(135deg, #FFD700, #FFA500); }
  .history-ball.range-2 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
  .history-ball.range-3 { background: linear-gradient(135deg, #e63329, #ff6b6b); }
  .history-ball.range-4 { background: linear-gradient(135deg, #a855f7, #6366f1); }
  .history-ball.range-5 { background: linear-gradient(135deg, #22c55e, #10b981); }
  .history-ball.bonus-border { box-shadow: 0 0 0 2px var(--gold); }
  .history-plus {
    color: rgba(255,215,0,0.4);
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
  }
  .history-time {
    font-size: 10px;
    color: rgba(255,255,255,0.15);
    min-width: 50px;
    text-align: right;
  }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: rgba(255,255,255,0.15);
    font-size: 13px;
    letter-spacing: 1px;
  }

  /* === CONFETTI CANVAS === */
  #confetti {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  /* === SOUND TOGGLE === */
  .sound-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.5);
    color: rgba(255,255,255,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    z-index: 20;
    font-size: 18px;
  }
  .sound-toggle:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  /* === ANIMATIONS === */
  @keyframes fadeInDown {
    from { opacity:0; transform:translateY(-30px); }
    to { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeInUp {
    from { opacity:0; transform:translateY(30px); }
    to { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity:0; }
    to { opacity:1; }
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  @keyframes ballBounce {
    0% { transform: translateY(80px) scale(0) rotate(-180deg); }
    60% { transform: translateY(-10px) scale(1.1) rotate(10deg); }
    80% { transform: translateY(5px) scale(0.95) rotate(-5deg); }
    100% { transform: translateY(0) scale(1) rotate(0deg); }
  }
  @keyframes bonusPulse {
    0%, 100% { box-shadow: inset -8px -8px 20px rgba(0,0,0,0.5), inset 4px 4px 10px rgba(255,255,255,0.3), 0 8px 32px rgba(0,0,0,0.6), 0 0 20px var(--ball-glow), 0 0 0 0 rgba(255,215,0,0.4); }
    50% { box-shadow: inset -8px -8px 20px rgba(0,0,0,0.5), inset 4px 4px 10px rgba(255,255,255,0.3), 0 8px 32px rgba(0,0,0,0.6), 0 0 20px var(--ball-glow), 0 0 0 12px rgba(255,215,0,0); }
  }
  @keyframes slideIn {
    from { opacity:0; transform:translateX(-20px); }
    to { opacity:1; transform:translateX(0); }
  }
  @keyframes spin3d {
    0% { transform: rotateY(0deg) rotateX(0deg); }
    100% { transform: rotateY(1080deg) rotateX(360deg); }
  }

  /* Mobile */
  @media (max-width: 600px) {
    .ball { width: 60px; height: 60px; font-size: 22px; }
    .ball::before { top:7px; left:13px; width:15px; height:9px; }
    .placeholder-ball { width: 60px; height: 60px; font-size: 16px; }
    .balls-row { gap: 8px; }
    .btn-generate { padding: 15px 40px; font-size: 14px; letter-spacing: 3px; }
    .history-ball { width: 28px; height: 28px; font-size: 10px; }
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>
<canvas id="confetti"></canvas>

<div class="ambient-glow glow-1"></div>
<div class="ambient-glow glow-2"></div>
<div class="ambient-glow glow-3"></div>

<button class="sound-toggle" id="soundToggle" title="사운드 ON/OFF">🔊</button>

<div class="container">
  <div class="logo">
    <div class="logo-sub">★ Premium Lucky ★</div>
    <div class="logo-main">LOTTO<br>UNIVERSE</div>
    <div class="logo-tagline">당신의 행운을 깨워드립니다</div>
  </div>

  <div class="separator"></div>

  <div class="ball-stage" id="ballStage">
    <div class="placeholder-balls">
      <div class="placeholder-ball">?</div>
      <div class="placeholder-ball">?</div>
      <div class="placeholder-ball">?</div>
      <div class="placeholder-ball">?</div>
      <div class="placeholder-ball">?</div>
      <div class="placeholder-ball">?</div>
      <span style="color:rgba(255,215,0,0.15);font-family:'Orbitron';font-size:28px;margin:0 4px;">+</span>
      <div class="placeholder-ball" style="border-color:rgba(255,215,0,0.2);">?</div>
    </div>
  </div>

  <button class="btn-generate" id="generateBtn" onclick="generate()">
    GENERATE
  </button>

  <div class="options-row">
    <button class="option-btn active" data-count="1" onclick="setCount(1, this)">1게임</button>
    <button class="option-btn" data-count="3" onclick="setCount(3, this)">3게임</button>
    <button class="option-btn" data-count="5" onclick="setCount(5, this)">5게임</button>
    <button class="option-btn" data-count="auto" onclick="toggleAuto(this)">⚡ AUTO</button>
  </div>

  <div class="history-section">
    <div class="history-header">
      <div class="history-title">History</div>
      <button class="history-clear" id="clearBtn" onclick="clearHistory()">전체 삭제</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-state">버튼을 눌러 행운의 번호를 생성하세요 ✦</div>
    </div>
  </div>
</div>

<script>
// === PARTICLE SYSTEM ===
const pc = document.getElementById('particles');
const pctx = pc.getContext('2d');
let particles = [];

function resizeParticles() {
  pc.width = window.innerWidth;
  pc.height = window.innerHeight;
}
resizeParticles();
window.addEventListener('resize', resizeParticles);

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * pc.width;
    this.y = Math.random() * pc.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.speedY = (Math.random() - 0.5) * 0.3;
    this.opacity = Math.random() * 0.5 + 0.1;
    this.pulse = Math.random() * Math.PI * 2;
    this.color = Math.random() > 0.7 ? '#FFD700' : '#ffffff';
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.pulse += 0.02;
    if (this.x < 0 || this.x > pc.width || this.y < 0 || this.y > pc.height) this.reset();
  }
  draw() {
    const o = this.opacity * (0.5 + 0.5 * Math.sin(this.pulse));
    pctx.beginPath();
    pctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    pctx.fillStyle = this.color;
    pctx.globalAlpha = o;
    pctx.fill();
    pctx.globalAlpha = 1;
  }
}

for (let i = 0; i < 80; i++) particles.push(new Particle());

function animateParticles() {
  pctx.clearRect(0, 0, pc.width, pc.height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// === CONFETTI SYSTEM ===
const cc = document.getElementById('confetti');
const cctx = cc.getContext('2d');
let confettis = [];

function resizeConfetti() {
  cc.width = window.innerWidth;
  cc.height = window.innerHeight;
}
resizeConfetti();
window.addEventListener('resize', resizeConfetti);

class Confetti {
  constructor() {
    this.x = Math.random() * cc.width;
    this.y = -20;
    this.size = Math.random() * 8 + 4;
    this.speedY = Math.random() * 4 + 2;
    this.speedX = (Math.random() - 0.5) * 4;
    this.rotation = Math.random() * 360;
    this.rotSpeed = (Math.random() - 0.5) * 10;
    this.opacity = 1;
    this.color = ['#FFD700','#e63329','#4facfe','#a855f7','#22c55e','#ff6b6b','#00f2fe'][Math.floor(Math.random()*7)];
    this.shape = Math.random() > 0.5 ? 'rect' : 'circle';
  }
  update() {
    this.y += this.speedY;
    this.x += this.speedX;
    this.rotation += this.rotSpeed;
    this.speedY += 0.05;
    this.opacity -= 0.005;
    return this.opacity > 0 && this.y < cc.height + 20;
  }
  draw() {
    cctx.save();
    cctx.translate(this.x, this.y);
    cctx.rotate(this.rotation * Math.PI / 180);
    cctx.globalAlpha = this.opacity;
    cctx.fillStyle = this.color;
    if (this.shape === 'rect') {
      cctx.fillRect(-this.size/2, -this.size/4, this.size, this.size/2);
    } else {
      cctx.beginPath();
      cctx.arc(0, 0, this.size/2, 0, Math.PI * 2);
      cctx.fill();
    }
    cctx.restore();
  }
}

function launchConfetti() {
  for (let i = 0; i < 120; i++) {
    const c = new Confetti();
    c.x = cc.width / 2 + (Math.random() - 0.5) * 300;
    c.y = cc.height / 2;
    c.speedY = -(Math.random() * 12 + 4);
    c.speedX = (Math.random() - 0.5) * 12;
    confettis.push(c);
  }
}

function animateConfetti() {
  cctx.clearRect(0, 0, cc.width, cc.height);
  confettis = confettis.filter(c => { const alive = c.update(); c.draw(); return alive; });
  if (confettis.length > 0) requestAnimationFrame(animateConfetti);
}

// === SOUND (Web Audio API) ===
let audioCtx = null;
let soundEnabled = true;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, duration, delay = 0) {
  if (!soundEnabled) return;
  initAudio();
  setTimeout(() => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + duration);
  }, delay);
}

function playBallSound(index) {
  const notes = [523, 587, 659, 698, 784, 880, 988];
  playTone(notes[index % 7], 0.3, 0);
}

function playBonusSound() {
  playTone(1047, 0.15, 0);
  playTone(1319, 0.15, 100);
  playTone(1568, 0.4, 200);
}

document.getElementById('soundToggle').addEventListener('click', function() {
  soundEnabled = !soundEnabled;
  this.textContent = soundEnabled ? '🔊' : '🔇';
});

// === LOTTO LOGIC ===
let gameCount = 1;
let history = [];
let historyCounter = 0;
let isGenerating = false;
let autoMode = false;
let autoInterval = null;

function getRange(n) {
  if (n <= 10) return 'range-1';
  if (n <= 20) return 'range-2';
  if (n <= 30) return 'range-3';
  if (n <= 40) return 'range-4';
  return 'range-5';
}

function generateNumbers() {
  const nums = [];
  while (nums.length < 6) {
    const n = Math.floor(Math.random() * 45) + 1;
    if (!nums.includes(n)) nums.push(n);
  }
  nums.sort((a, b) => a - b);
  let bonus;
  do { bonus = Math.floor(Math.random() * 45) + 1; } while (nums.includes(bonus));
  return { main: nums, bonus };
}

function setCount(n, el) {
  gameCount = n;
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (autoMode) {
    autoMode = false;
    clearInterval(autoInterval);
    document.querySelector('[data-count="auto"]').classList.remove('active');
  }
}

function toggleAuto(el) {
  autoMode = !autoMode;
  el.classList.toggle('active');
  if (autoMode) {
    document.querySelectorAll('.option-btn:not([data-count="auto"])').forEach(b => b.classList.remove('active'));
    generate();
    autoInterval = setInterval(() => {
      if (!isGenerating) generate();
    }, 4000);
  } else {
    clearInterval(autoInterval);
  }
}

async function generate() {
  if (isGenerating) return;
  isGenerating = true;

  const btn = document.getElementById('generateBtn');
  btn.classList.add('spinning');
  btn.textContent = '⟳ SPINNING...';

  const count = autoMode ? 1 : gameCount;

  for (let g = 0; g < count; g++) {
    const { main, bonus } = generateNumbers();

    await showBalls(main, bonus);
    addToHistory(main, bonus);

    if (g < count - 1) await sleep(800);
  }

  launchConfetti();
  animateConfetti();

  btn.classList.remove('spinning');
  btn.textContent = 'GENERATE';
  isGenerating = false;
}

function showBalls(main, bonus) {
  return new Promise(resolve => {
    const stage = document.getElementById('ballStage');
    stage.innerHTML = '';

    const row = document.createElement('div');
    row.className = 'balls-row';

    main.forEach((num, i) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'ball-wrapper';
      const ball = document.createElement('div');
      ball.className = `ball ${getRange(num)}`;
      ball.textContent = num;
      wrapper.appendChild(ball);
      row.appendChild(wrapper);

      setTimeout(() => {
        wrapper.classList.add('visible', 'bounce');
        playBallSound(i);
      }, 300 + i * 200);
    });

    const plus = document.createElement('span');
    plus.className = 'plus-sign';
    plus.textContent = '+';
    row.appendChild(plus);

    const bonusWrapper = document.createElement('div');
    bonusWrapper.className = 'ball-wrapper';
    const bonusBall = document.createElement('div');
    bonusBall.className = `ball ${getRange(bonus)} bonus`;
    bonusBall.textContent = bonus;
    bonusWrapper.appendChild(bonusBall);
    row.appendChild(bonusWrapper);

    setTimeout(() => {
      plus.classList.add('visible');
    }, 300 + 6 * 200);

    setTimeout(() => {
      bonusWrapper.classList.add('visible', 'bounce');
      playBonusSound();
    }, 300 + 6 * 200 + 200);

    stage.appendChild(row);

    setTimeout(resolve, 300 + 7 * 200 + 400);
  });
}

function addToHistory(main, bonus) {
  historyCounter++;
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

  history.unshift({ id: historyCounter, main, bonus, time });
  if (history.length > 20) history.pop();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (history.length === 0) {
    list.innerHTML = '<div class="empty-state">버튼을 눌러 행운의 번호를 생성하세요 ✦</div>';
    return;
  }
  list.innerHTML = history.map(h => `
    <div class="history-item">
      <span class="history-num">#${h.id}</span>
      <div class="history-balls">
        ${h.main.map(n => `<div class="history-ball ${getRange(n)}">${n}</div>`).join('')}
        <span class="history-plus">+</span>
        <div class="history-ball ${getRange(h.bonus)} bonus-border">${h.bonus}</div>
      </div>
      <span class="history-time">${h.time}</span>
    </div>
  `).join('');
}

function clearHistory() {
  history = [];
  historyCounter = 0;
  renderHistory();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
