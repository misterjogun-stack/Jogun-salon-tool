<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOGUN LUCK SPHERE</title>
<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Noto Sans KR,sans-serif;
  background:radial-gradient(circle at 20% 20%,#0f1635,#050816 70%);
  color:#fff;
  text-align:center;
}

h1{
  margin-top:30px;
  font-size:48px;
  letter-spacing:-1px;
}

.sub{
  opacity:.6;
  margin-bottom:20px;
}

#machineWrap{
  position:relative;
  width:500px;
  height:500px;
  margin:auto;
}

canvas{
  background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.15),rgba(255,255,255,.03) 40%,transparent 60%);
  border-radius:50%;
  border:2px solid rgba(255,255,255,.25);
  box-shadow:0 0 40px rgba(0,0,0,.6), inset 0 0 30px rgba(255,255,255,.08);
}

#controls{
  margin-top:30px;
}

button{
  padding:14px 24px;
  border-radius:14px;
  border:none;
  margin:6px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

.start{
  background:linear-gradient(45deg,#7a5cff,#00d6ff);
  color:#fff;
}

.reset{
  background:#333;
  color:#fff;
}

#results{
  margin-top:25px;
  font-size:26px;
  letter-spacing:3px;
}

.ballResult{
  display:inline-block;
  width:52px;
  height:52px;
  line-height:52px;
  border-radius:50%;
  margin:4px;
  font-weight:800;
  background:#ffd84d;
  color:#111;
}

#fortune{
  margin-top:20px;
  opacity:.8;
  font-size:18px;
}

.brand{
  margin-top:20px;
  opacity:.4;
}
</style>
</head>
<body>

<h1>LUCK SPHERE</h1>
<div class="sub">AI 로또 추첨기 · by JOGUN</div>

<div id="machineWrap">
<canvas id="canvas" width="500" height="500"></canvas>
</div>

<div id="controls">
<button class="start" onclick="startDraw()">추첨 시작</button>
<button class="reset" onclick="resetDraw()">리셋</button>
</div>

<div id="results"></div>
<div id="fortune"></div>

<div class="brand">@soowan_jogun</div>

<script>
const canvas=document.getElementById('canvas')
const ctx=canvas.getContext('2d')

let balls=[]
let gravity=0.25
let friction=0.995
let running=true
let selected=[]

function randomColor(){
  const colors=["#ffd84d","#54a8ff","#ff5f7a","#fff"]
  return colors[Math.floor(Math.random()*colors.length)]
}

function Ball(x,y,r,n){
  this.x=x
  this.y=y
  this.r=r
  this.number=n
  this.vx=(Math.random()*4-2)
  this.vy=(Math.random()*4-2)
  this.color=randomColor()
}

Ball.prototype.update=function(){

this.vy+=gravity
this.x+=this.vx
this.y+=this.vy

this.vx*=friction
this.vy*=friction

const center=250
const radius=220

let dx=this.x-center
let dy=this.y-center
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist+this.r>radius){

let angle=Math.atan2(dy,dx)

this.x=center+Math.cos(angle)*(radius-this.r)
this.y=center+Math.sin(angle)*(radius-this.r)

let nx=Math.cos(angle)
let ny=Math.sin(angle)

let dot=this.vx*nx+this.vy*ny

this.vx-=2*dot*nx
this.vy-=2*dot*ny

}

}

Ball.prototype.draw=function(){
ctx.beginPath()
ctx.fillStyle=this.color
ctx.arc(this.x,this.y,this.r,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="#111"
ctx.font="bold 16px sans-serif"
ctx.textAlign="center"
ctx.textBaseline="middle"
ctx.fillText(this.number,this.x,this.y)
}

function initBalls(){
balls=[]
for(let i=1;i<=30;i++){
balls.push(new Ball(250,250,18,i))
}
}

function animate(){
ctx.clearRect(0,0,500,500)

for(let b of balls){
b.update()
b.draw()
}

if(running) requestAnimationFrame(animate)
}

function startDraw(){
if(selected.length>0)return

let pool=[...balls]

for(let i=0;i<5;i++){
let pick=pool[Math.floor(Math.random()*pool.length)]
selected.push(pick.number)
pool=pool.filter(b=>b.number!==pick.number)
}

showResults()
}

function showResults(){
const container=document.getElementById('results')
container.innerHTML=""

selected.sort((a,b)=>a-b)

selected.forEach(n=>{
let div=document.createElement('div')
div.className='ballResult'
div.innerText=n
container.appendChild(div)
})

const fortunes=[
"오늘은 새로운 기회가 찾아올 수 있는 날입니다.",
"생각하지 못한 행운이 생길 가능성이 있습니다.",
"작은 선택이 큰 결과로 이어질 수 있습니다.",
"오늘은 직감을 믿어보세요.",
"도전하면 좋은 흐름이 있습니다."
]

const msg=fortunes[Math.floor(Math.random()*fortunes.length)]

document.getElementById('fortune').innerText=msg
}

function resetDraw(){
selected=[]
document.getElementById('results').innerHTML=""
document.getElementById('fortune').innerHTML=""
}

initBalls()
animate()
</script>

</body>
</html>
