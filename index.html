<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JOGUN LOTTO MACHINE</title>

<style>

body{
background:#02020c;
color:white;
text-align:center;
font-family:Arial;
padding-top:40px;
}

/* 제목 */

.title{
font-size:42px;
font-weight:900;
color:#00eaff;
text-shadow:0 0 20px #00eaff;
}

.instagram{
color:#ff2bd6;
margin-bottom:30px;
}

/* 추첨기 */

.machine{
width:300px;
height:300px;
margin:auto;
border-radius:50%;

background:rgba(255,255,255,0.05);

border:3px solid rgba(255,255,255,0.3);

box-shadow:
0 0 30px rgba(0,234,255,0.5),
inset 0 0 40px rgba(255,255,255,0.1);

position:relative;

overflow:hidden;
}

/* 내부 회전 */

.inner{
position:absolute;
width:100%;
height:100%;
animation:spin 6s linear infinite;
}

@keyframes spin{

0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}

}

/* 내부 공 */

.ball-inside{

width:25px;
height:25px;

border-radius:50%;

background:radial-gradient(circle at 30% 30%, white, #ffd000, #ff8c00);

position:absolute;

}

/* 랜덤 위치 */

.ball1{top:20%;left:30%;}
.ball2{top:50%;left:60%;}
.ball3{top:70%;left:40%;}
.ball4{top:35%;left:70%;}
.ball5{top:60%;left:20%;}
.ball6{top:10%;left:55%;}
.ball7{top:80%;left:50%;}

/* 버튼 */

button{

margin-top:30px;

padding:15px 35px;

font-size:18px;

border:none;

border-radius:30px;

background:linear-gradient(45deg,#00eaff,#0066ff);

color:white;

cursor:pointer;

box-shadow:0 0 20px #00eaff;

}

/* 결과 */

#result{

margin-top:40px;

display:flex;

justify-content:center;

gap:15px;

}

/* 당첨 공 */

.ball{

width:70px;
height:70px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:22px;
font-weight:bold;

background:radial-gradient(circle at 30% 30%, white, #ffd000 40%, #ff8c00);

box-shadow:
0 0 15px rgba(255,255,255,0.7),
inset -5px -10px 15px rgba(0,0,0,0.4);

transform:scale(0);

animation:pop 0.6s forwards;

}

@keyframes pop{

0%{transform:scale(0);}
60%{transform:scale(1.2);}
100%{transform:scale(1);}

}

.footer{

margin-top:60px;

color:#777;

}

</style>

</head>

<body>

<div class="title">JOGUN LOTTO MACHINE</div>
<div class="instagram">@soowan_jogun</div>

<div class="machine">

<div class="inner">

<div class="ball-inside ball1"></div>
<div class="ball-inside ball2"></div>
<div class="ball-inside ball3"></div>
<div class="ball-inside ball4"></div>
<div class="ball-inside ball5"></div>
<div class="ball-inside ball6"></div>
<div class="ball-inside ball7"></div>

</div>

</div>

<button onclick="draw()">추첨 시작</button>

<div id="result"></div>

<div class="footer">
Created by JOGUN
</div>

<script>

function draw(){

let result=document.getElementById("result");

result.innerHTML="";

let numbers=[];

while(numbers.length<5){

let n=Math.floor(Math.random()*45)+1;

if(!numbers.includes(n)){

numbers.push(n);

}

}

numbers.sort((a,b)=>a-b);

numbers.forEach((num,i)=>{

setTimeout(()=>{

let ball=document.createElement("div");

ball.className="ball";

ball.innerText=num;

result.appendChild(ball);

},i*800);

});

}

</script>

</body>
</html>
