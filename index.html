<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTURE LOTTO 2026</title>
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-blue: #00f3ff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #020205 100%);
            color: white;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 20px var(--neon-blue);
            margin-bottom: 50px;
        }

        /* 4D 컨테이너 스타일 */
        .lotto-container {
            display: flex;
            gap: 20px;
            perspective: 1000px;
            margin-bottom: 50px;
        }

        .ball {
            width: 80px;
            height: 80px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 
                        inset 0 0 15px rgba(255, 255, 255, 0.1);
            transform: translateZ(20px) rotateX(10deg);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
        }

        .ball.active {
            opacity: 1;
            transform: translateZ(50px) rotateX(0deg);
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        /* MZ 버튼 스타일 */
        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 800;
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
            overflow: hidden;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 40px var(--neon-blue);
        }

        button:active {
            transform: scale(0.95);
        }

        /* 배경 장식 */
        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            z-index: -1;
            bottom: -50%;
            animation: move-grid 10s linear infinite;
        }

        @keyframes move-grid {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }
    </style>
</head>
<body>

    <div class="grid"></div>

    <h1>Future Luck</h1>

    <div class="lotto-container" id="lotto-box">
        <div class="ball">?</div>
        <div class="ball">?</div>
        <div class="ball">?</div>
        <div class="ball">?</div>
        <div class="ball">?</div>
        <div class="ball">?</div>
    </div>

    <button onclick="generateLotto()">Generate Numbers</button>

    <script>
        function generateLotto() {
            const balls = document.querySelectorAll('.ball');
            const numbers = [];

            // 1~45 번호 추출
            while(numbers.length < 6) {
                let num = Math.floor(Math.random() * 45) + 1;
                if(!numbers.includes(num)) {
                    numbers.push(num);
                }
            }
            numbers.sort((a, b) => a - b);

            // 애니메이션 효과와 함께 번호 노출
            balls.forEach((ball, index) => {
                ball.classList.remove('active');
                
                setTimeout(() => {
                    ball.textContent = numbers[index];
                    ball.classList.add('active');
                    
                    // 4D 햅틱 느낌의 진동 (지원되는 브라우저만)
                    if (navigator.vibrate) {
                        navigator.vibrate(20);
                    }
                }, index * 200); // 0.2초 간격으로 하나씩 등장
            });
        }
    </script>
</body>
</html>
