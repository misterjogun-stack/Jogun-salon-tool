<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리얼 로또 추첨기</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #111827;
      --panel: rgba(255,255,255,0.08);
      --panel-border: rgba(255,255,255,0.15);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --danger: #ef4444;
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(59,130,246,0.18), transparent 30%),
        radial-gradient(circle at 80% 15%, rgba(16,185,129,0.14), transparent 28%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(1100px, 100%);
    }

    .title-wrap {
      text-align: center;
      margin-bottom: 18px;
    }

    .title-wrap h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 4vw, 48px);
      letter-spacing: -0.03em;
    }

    .title-wrap p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .machine-area {
      display: grid;
      grid-template-columns: 1.3fr 0.7fr;
      gap: 22px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .machine-area {
        grid-template-columns: 1fr;
      }
    }

    .machine-card,
    .result-card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .machine-card {
      padding: 18px 18px 22px;
    }

    .result-card {
      padding: 20px;
    }

    .machine-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: #e2e8f0;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease, opacity 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .start-btn {
      background: var(--accent);
      color: white;
    }

    .start-btn:hover {
      background: var(--accent-hover);
    }

    .reset-btn {
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.14);
    }

    .reset-btn:hover {
      background: rgba(255,255,255,0.18);
    }

    .start-btn:disabled,
    .reset-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .machine-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      min-height: 420px;
      border-radius: 20px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 15%, rgba(255,255,255,0.14), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.1);
    }

    @media (max-width: 700px) {
      .machine-stage {
        min-height: 360px;
      }
    }

    .machine-base {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 64%;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(180deg, #64748b, #334155);
      box-shadow:
        inset 0 6px 12px rgba(255,255,255,0.18),
        inset 0 -8px 18px rgba(0,0,0,0.35),
        0 10px 30px rgba(0,0,0,0.35);
    }

    .machine-pole {
      position: absolute;
      bottom: 88px;
      width: 20px;
      height: 140px;
      background: linear-gradient(180deg, #cbd5e1, #64748b);
      border-radius: 12px;
      box-shadow: inset 0 4px 8px rgba(255,255,255,0.25);
    }

    .machine-pole.left {
      left: 28%;
    }

    .machine-pole.right {
      right: 28%;
    }

    .drum {
      position: absolute;
      left: 50%;
      top: 42%;
      transform: translate(-50%, -50%);
      width: min(72%, 520px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.35), rgba(255,255,255,0.08) 28%, rgba(255,255,255,0.03) 60%, rgba(255,255,255,0.02) 100%);
      border: 8px solid rgba(226,232,240,0.65);
      box-shadow:
        inset 0 0 50px rgba(255,255,255,0.08),
        inset 0 -30px 60px rgba(0,0,0,0.18),
        0 15px 40px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .drum::before {
      content: "";
      position: absolute;
      inset: 7% 7%;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.22);
      pointer-events: none;
    }

    .drum::after {
      content: "";
      position: absolute;
      left: 12%;
      top: 8%;
      width: 28%;
      height: 20%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.4), rgba(255,255,255,0.02));
      filter: blur(10px);
      pointer-events: none;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .outlet {
      position: absolute;
      left: 50%;
      bottom: 84px;
      transform: translateX(-50%);
      width: 110px;
      height: 22px;
      border-radius: 12px;
      background: linear-gradient(180deg, #94a3b8, #475569);
      box-shadow:
        inset 0 4px 7px rgba(255,255,255,0.22),
        0 6px 18px rgba(0,0,0,0.3);
      z-index: 3;
    }

    .outlet-tube {
      position: absolute;
      left: 50%;
      bottom: 42px;
      transform: translateX(-50%);
      width: 56px;
      height: 62px;
      border-radius: 20px 20px 14px 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.15));
      border: 3px solid rgba(226,232,240,0.7);
      box-shadow:
        inset 0 0 20px rgba(255,255,255,0.1),
        0 8px 24px rgba(0,0,0,0.28);
      overflow: hidden;
      z-index: 2;
    }

    .outlet-tube::after {
      content: "";
      position: absolute;
      top: 6px;
      left: 10px;
      width: 18px;
      height: 48px;
      border-radius: 999px;
      background: rgba(255,255,255,0.2);
      filter: blur(2px);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status {
      font-size: 14px;
      color: #e2e8f0;
    }

    .hint {
      font-size: 13px;
      color: #94a3b8;
    }

    .result-card h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(70px, 1fr));
      gap: 12px;
    }

    @media (max-width: 900px) {
      .result-grid {
        grid-template-columns: repeat(6, minmax(48px, 1fr));
      }
    }

    @media (max-width: 560px) {
      .result-grid {
        grid-template-columns: repeat(3, minmax(60px, 1fr));
      }
    }

    .result-ball {
      height: 78px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .result-ball.empty::after {
      content: "?";
      font-size: 30px;
      color: rgba(255,255,255,0.35);
      font-weight: 800;
    }

    .ball-ui {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 22px;
      color: white;
      position: relative;
      box-shadow:
        inset 0 7px 10px rgba(255,255,255,0.26),
        inset 0 -10px 16px rgba(0,0,0,0.22),
        0 8px 16px rgba(0,0,0,0.25);
    }

    .ball-ui::before {
      content: "";
      position: absolute;
      top: 8px;
      left: 12px;
      width: 18px;
      height: 11px;
      border-radius: 50%;
      background: rgba(255,255,255,0.38);
      transform: rotate(-18deg);
    }

    .ball-ui.yellow { background: radial-gradient(circle at 30% 30%, #ffe27a, #f4b400 60%, #c88900); }
    .ball-ui.blue   { background: radial-gradient(circle at 30% 30%, #8fdbff, #3498db 60%, #1d4f91); }
    .ball-ui.red    { background: radial-gradient(circle at 30% 30%, #ff9d9d, #ef4444 60%, #991b1b); }
    .ball-ui.gray   { background: radial-gradient(circle at 30% 30%, #e5e7eb, #9ca3af 60%, #4b5563); }
    .ball-ui.green  { background: radial-gradient(circle at 30% 30%, #bef264, #65a30d 60%, #3f6212); }

    .result-info {
      margin-top: 18px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #dbeafe;
      line-height: 1.6;
      font-size: 14px;
    }

    .small-note {
      margin-top: 12px;
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title-wrap">
      <h1>🎰 리얼 로또 추첨기</h1>
      <p>실제 추첨기 느낌을 살린 섞기 + 배출 애니메이션 버전</p>
    </div>

    <div class="machine-area">
      <section class="machine-card">
        <div class="machine-top">
          <div class="badge">실시간 혼합 애니메이션</div>
          <div class="controls">
            <button class="start-btn" id="startBtn">추첨 시작</button>
            <button class="reset-btn" id="resetBtn">초기화</button>
          </div>
        </div>

        <div class="machine-stage">
          <div class="machine-pole left"></div>
          <div class="machine-pole right"></div>

          <div class="drum">
            <canvas id="lottoCanvas"></canvas>
          </div>

          <div class="outlet"></div>
          <div class="outlet-tube"></div>
          <div class="machine-base"></div>
        </div>

        <div class="status-row">
          <div class="status" id="statusText">대기 중</div>
          <div class="hint">공이 통 안에서 섞인 뒤 6개가 하나씩 배출됩니다.</div>
        </div>
      </section>

      <aside class="result-card">
        <h2>추첨 결과</h2>
        <div class="result-grid" id="resultGrid">
          <div class="result-ball empty"></div>
          <div class="result-ball empty"></div>
          <div class="result-ball empty"></div>
          <div class="result-ball empty"></div>
          <div class="result-ball empty"></div>
          <div class="result-ball empty"></div>
        </div>

        <div class="result-info" id="resultInfo">
          아직 추첨 전입니다.
        </div>

        <div class="small-note">
          이 버전은 “실제 추첨기처럼 보이는 시뮬레이션”입니다.  
          물리 엔진 없이도 충분히 리얼하게 보이도록 설계했습니다.
        </div>
      </aside>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("lottoCanvas");
    const ctx = canvas.getContext("2d");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusText = document.getElementById("statusText");
    const resultGrid = document.getElementById("resultGrid");
    const resultInfo = document.getElementById("resultInfo");

    const TOTAL_BALLS = 45;
    const PICK_COUNT = 6;

    let balls = [];
    let selectedNumbers = [];
    let displayedResults = [];
    let animationId = null;
    let lastTime = 0;
    let state = "idle";
    let stateStartedAt = 0;
    let mixDuration = 4500;
    let nextDropAt = 0;
    let activeDropBall = null;
    let drumRotation = 0;

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.floor(rect.width * ratio);
      canvas.height = Math.floor(rect.height * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function getBallColorClass(num) {
      if (num <= 10) return "yellow";
      if (num <= 20) return "blue";
      if (num <= 30) return "red";
      if (num <= 40) return "gray";
      return "green";
    }

    function getBallGradient(num, x, y, r) {
      const g = ctx.createRadialGradient(
        x - r * 0.35,
        y - r * 0.45,
        r * 0.18,
        x,
        y,
        r
      );

      if (num <= 10) {
        g.addColorStop(0, "#fff3b0");
        g.addColorStop(0.55, "#f4c430");
        g.addColorStop(1, "#b77900");
      } else if (num <= 20) {
        g.addColorStop(0, "#b7f0ff");
        g.addColorStop(0.55, "#45b7ff");
        g.addColorStop(1, "#1e3a8a");
      } else if (num <= 30) {
        g.addColorStop(0, "#ffc1c1");
        g.addColorStop(0.55, "#ff5a5a");
        g.addColorStop(1, "#991b1b");
      } else if (num <= 40) {
        g.addColorStop(0, "#f3f4f6");
        g.addColorStop(0.55, "#9ca3af");
        g.addColorStop(1, "#374151");
      } else {
        g.addColorStop(0, "#d9ff9e");
        g.addColorStop(0.55, "#84cc16");
        g.addColorStop(1, "#365314");
      }

      return g;
    }

    function createBall(num, picked = false) {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const cx = w / 2;
      const cy = h / 2;
      const drumRadius = Math.min(w, h) * 0.44;
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.random() * (drumRadius - 20);

      return {
        num,
        radius: picked ? 20 : 16 + Math.random() * 2.5,
        x: cx + Math.cos(angle) * dist,
        y: cy + Math.sin(angle) * dist,
        vx: (Math.random() - 0.5) * 3.8,
        vy: (Math.random() - 0.5) * 3.8,
        rotation: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.12,
        picked,
        visible: true,
        dropping: false,
        dropProgress: 0
      };
    }

    function initBalls() {
      balls = [];
      for (let i = 1; i <= TOTAL_BALLS; i++) {
        balls.push(createBall(i));
      }
    }

    function shuffleArray(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function pickWinningNumbers() {
      const all = Array.from({ length: TOTAL_BALLS }, (_, i) => i + 1);
      return shuffleArray(all).slice(0, PICK_COUNT);
    }

    function resetResults() {
      displayedResults = [];
      resultGrid.innerHTML = "";
      for (let i = 0; i < PICK_COUNT; i++) {
        const cell = document.createElement("div");
        cell.className = "result-ball empty";
        resultGrid.appendChild(cell);
      }
      resultInfo.textContent = "아직 추첨 전입니다.";
    }

    function renderResults() {
      resultGrid.innerHTML = "";

      for (let i = 0; i < PICK_COUNT; i++) {
        const cell = document.createElement("div");
        cell.className = "result-ball";

        const num = displayedResults[i];
        if (num == null) {
          cell.classList.add("empty");
        } else {
          const ball = document.createElement("div");
          ball.className = `ball-ui ${getBallColorClass(num)}`;
          ball.textContent = num;
          cell.appendChild(ball);
        }

        resultGrid.appendChild(cell);
      }

      if (displayedResults.length === PICK_COUNT) {
        const sorted = [...displayedResults].sort((a, b) => a - b);
        resultInfo.innerHTML = `
          추첨 완료!<br>
          나온 순서: <strong>${displayedResults.join(", ")}</strong><br>
          오름차순 정렬: <strong>${sorted.join(", ")}</strong>
        `;
      } else if (displayedResults.length > 0) {
        resultInfo.textContent = `현재 ${displayedResults.length}개 추첨됨: ${displayedResults.join(", ")}`;
      } else {
        resultInfo.textContent = "아직 추첨 전입니다.";
      }
    }

    function updateStatus(text) {
      statusText.textContent = text;
    }

    function drawBall(ball) {
      if (!ball.visible) return;

      ctx.save();
      ctx.translate(ball.x, ball.y);
      ctx.rotate(ball.rotation);

      const r = ball.radius;

      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fillStyle = getBallGradient(ball.num, 0, 0, r);
      ctx.shadowColor = "rgba(0,0,0,0.25)";
      ctx.shadowBlur = 10;
      ctx.shadowOffsetY = 4;
      ctx.fill();

      ctx.shadowColor = "transparent";

      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.lineWidth = 1.4;
      ctx.strokeStyle = "rgba(255,255,255,0.35)";
      ctx.stroke();

      ctx.beginPath();
      ctx.ellipse(-r * 0.28, -r * 0.42, r * 0.3, r * 0.16, -0.4, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.35)";
      ctx.fill();

      ctx.fillStyle = ball.num <= 40 ? "rgba(255,255,255,0.95)" : "rgba(255,255,255,0.96)";
      ctx.font = `900 ${Math.max(12, r * 0.92)}px Arial`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.lineWidth = 3;
      ctx.strokeStyle = "rgba(0,0,0,0.18)";
      ctx.strokeText(String(ball.num), 0, 1);
      ctx.fillText(String(ball.num), 0, 0);

      ctx.restore();
    }

    function drawDrumEffect(w, h) {
      const cx = w / 2;
      const cy = h / 2;
      const radius = Math.min(w, h) * 0.47;

      ctx.save();

      const ringCount = 3;
      for (let i = 0; i < ringCount; i++) {
        const rr = radius - i * 26;
        ctx.beginPath();
        ctx.arc(cx, cy, rr, 0, Math.PI * 2);
        ctx.lineWidth = 1;
        ctx.strokeStyle = `rgba(255,255,255,${0.04 - i * 0.01})`;
        ctx.stroke();
      }

      ctx.translate(cx, cy);
      ctx.rotate(drumRotation);

      for (let i = 0; i < 4; i++) {
        ctx.rotate(Math.PI / 2);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(radius * 0.88, 0);
        ctx.lineWidth = 3;
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.stroke();
      }

      ctx.restore();
    }

    function constrainBallToDrum(ball, cx, cy, drumRadius) {
      const dx = ball.x - cx;
      const dy = ball.y - cy;
      const dist = Math.hypot(dx, dy);

      if (dist + ball.radius > drumRadius) {
        const nx = dx / dist;
        const ny = dy / dist;
        ball.x = cx + nx * (drumRadius - ball.radius);
        ball.y = cy + ny * (drumRadius - ball.radius);

        const dot = ball.vx * nx + ball.vy * ny;
        ball.vx -= 2 * dot * nx;
        ball.vy -= 2 * dot * ny;

        ball.vx *= 0.98;
        ball.vy *= 0.98;
      }
    }

    function resolveCollisions() {
      for (let i = 0; i < balls.length; i++) {
        const a = balls[i];
        if (!a.visible || a.dropping) continue;

        for (let j = i + 1; j < balls.length; j++) {
          const b = balls[j];
          if (!b.visible || b.dropping) continue;

          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.hypot(dx, dy);
          const minDist = a.radius + b.radius;

          if (dist < minDist && dist > 0.001) {
            const overlap = minDist - dist;
            const nx = dx / dist;
            const ny = dy / dist;

            a.x -= nx * overlap * 0.5;
            a.y -= ny * overlap * 0.5;
            b.x += nx * overlap * 0.5;
            b.y += ny * overlap * 0.5;

            const avx = a.vx;
            const avy = a.vy;
            a.vx = b.vx * 0.96;
            a.vy = b.vy * 0.96;
            b.vx = avx * 0.96;
            b.vy = avy * 0.96;
          }
        }
      }
    }

    function updateMixing(dt) {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const cx = w / 2;
      const cy = h / 2;
      const drumRadius = Math.min(w, h) * 0.44;

      drumRotation += dt * 0.0015;

      for (const ball of balls) {
        if (!ball.visible || ball.dropping) continue;

        const dx = ball.x - cx;
        const dy = ball.y - cy;
        const dist = Math.max(1, Math.hypot(dx, dy));

        const swirlStrength = 0.03;
        ball.vx += (-dy / dist) * swirlStrength * (1.2 + Math.random() * 0.8);
        ball.vy += (dx / dist) * swirlStrength * (1.2 + Math.random() * 0.8);

        ball.vx += (Math.random() - 0.5) * 0.15;
        ball.vy += (Math.random() - 0.5) * 0.15;

        const speedLimit = 4.8;
        const speed = Math.hypot(ball.vx, ball.vy);
        if (speed > speedLimit) {
          ball.vx = (ball.vx / speed) * speedLimit;
          ball.vy = (ball.vy / speed) * speedLimit;
        }

        ball.x += ball.vx * dt * 0.06;
        ball.y += ball.vy * dt * 0.06;

        ball.vx *= 0.996;
        ball.vy *= 0.996;
        ball.rotation += ball.spin * dt * 0.06;

        constrainBallToDrum(ball, cx, cy, drumRadius);
      }

      resolveCollisions();
    }

    function beginDrop() {
      const targetNumber = selectedNumbers[displayedResults.length];
      const ball = balls.find(b => b.num === targetNumber && b.visible && !b.dropping);
      if (!ball) return;

      activeDropBall = ball;
      ball.dropping = true;
      ball.dropProgress = 0;
      ball.radius = 20;
      updateStatus(`${displayedResults.length + 1}번째 공 추첨 중...`);
    }

    function updateDrop(dt) {
      if (!activeDropBall) return;

      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const startX = w / 2;
      const startY = h / 2 + h * 0.28;
      const endX = w / 2;
      const endY = h + 34;

      activeDropBall.dropProgress += dt / 900;
      const t = Math.min(1, activeDropBall.dropProgress);

      const eased = 1 - Math.pow(1 - t, 3);
      activeDropBall.x = startX + Math.sin(t * Math.PI) * 4;
      activeDropBall.y = startY + (endY - startY) * eased;
      activeDropBall.rotation += 0.18;

      if (t >= 1) {
        activeDropBall.visible = false;
        activeDropBall.dropping = false;
        displayedResults.push(activeDropBall.num);
        renderResults();
        activeDropBall = null;

        if (displayedResults.length >= PICK_COUNT) {
          state = "finished";
          updateStatus("추첨 완료");
          startBtn.disabled = false;
        } else {
          nextDropAt = performance.now() + 850;
          state = "pause-before-next-drop";
          updateStatus("다음 공 준비 중...");
        }
      }
    }

    function drawFrame() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;

      ctx.clearRect(0, 0, w, h);

      drawDrumEffect(w, h);

      const sortedForDraw = [...balls].sort((a, b) => a.y - b.y);
      for (const ball of sortedForDraw) {
        drawBall(ball);
      }

      ctx.save();
      const glow = ctx.createLinearGradient(0, 0, 0, h);
      glow.addColorStop(0, "rgba(255,255,255,0.08)");
      glow.addColorStop(1, "rgba(255,255,255,0.01)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, w, h);
      ctx.restore();
    }

    function animate(now) {
      if (!lastTime) lastTime = now;
      const dt = Math.min(32, now - lastTime);
      lastTime = now;

      if (state === "mixing") {
        updateMixing(dt);
        if (now - stateStartedAt >= mixDuration) {
          state = "dropping";
          beginDrop();
        }
      } else if (state === "dropping") {
        updateMixing(dt * 0.65);
        updateDrop(dt);
      } else if (state === "pause-before-next-drop") {
        updateMixing(dt * 0.9);
        if (now >= nextDropAt) {
          state = "dropping";
          beginDrop();
        }
      } else if (state === "finished" || state === "idle") {
        updateMixing(dt * 0.35);
      }

      drawFrame();
      animationId = requestAnimationFrame(animate);
    }

    function startDraw() {
      if (state === "mixing" || state === "dropping" || state === "pause-before-next-drop") {
        return;
      }

      selectedNumbers = pickWinningNumbers();
      displayedResults = [];
      renderResults();

      for (const ball of balls) {
        ball.visible = true;
        ball.dropping = false;
        ball.dropProgress = 0;
      }

      state = "mixing";
      stateStartedAt = performance.now();
      mixDuration = 4200 + Math.random() * 1200;
      updateStatus("공을 섞는 중...");
      startBtn.disabled = true;
    }

    function resetMachine() {
      state = "idle";
      selectedNumbers = [];
      displayedResults = [];
      activeDropBall = null;
      lastTime = 0;
      drumRotation = 0;
      initBalls();
      resetResults();
      updateStatus("대기 중");
      startBtn.disabled = false;
      drawFrame();
    }

    function startLoopIfNeeded() {
      if (!animationId) {
        animationId = requestAnimationFrame(animate);
      }
    }

    window.addEventListener("resize", () => {
      resizeCanvas();
      initBalls();
      drawFrame();
    });

    startBtn.addEventListener("click", startDraw);
    resetBtn.addEventListener("click", resetMachine);

    resizeCanvas();
    initBalls();
    resetResults();
    drawFrame();
    startLoopIfNeeded();
  </script>
</body>
</html>
