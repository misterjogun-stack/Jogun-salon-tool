<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <meta name="theme-color" content="#0b1020" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LUCK SPHERE" />
  <title>LUCK SPHERE</title>

  <style>
    :root{
      --bg-1:#070b16;
      --bg-2:#0d1326;
      --bg-3:#141c35;
      --panel:rgba(255,255,255,0.06);
      --panel-2:rgba(255,255,255,0.04);
      --stroke:rgba(255,255,255,0.10);
      --text:#f5f7ff;
      --muted:rgba(255,255,255,0.62);

      --gold:#d8b36d;
      --gold-deep:#8f6d35;
      --silver:#e8edf7;
      --purple:#9f8cff;
      --blue:#58a8ff;
      --green:#1fcf90;
      --red:#ff5d74;
      --orange:#f5a623;

      --shadow:0 28px 80px rgba(0,0,0,0.42);
      --radius-xl:30px;
      --radius-lg:22px;
      --radius-md:16px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(88,168,255,0.16), transparent 24%),
        radial-gradient(circle at 85% 15%, rgba(159,140,255,0.12), transparent 22%),
        radial-gradient(circle at 80% 85%, rgba(216,179,109,0.10), transparent 18%),
        linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
      overflow-x:hidden;
    }

    body{
      display:flex;
      justify-content:center;
      padding:18px 14px 34px;
    }

    .bg-grid{
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size:44px 44px;
      mask-image:linear-gradient(to bottom, rgba(255,255,255,0.35), rgba(255,255,255,0.06));
      -webkit-mask-image:linear-gradient(to bottom, rgba(255,255,255,0.35), rgba(255,255,255,0.06));
      opacity:.35;
      z-index:0;
    }

    .glow{
      position:fixed;
      width:360px;
      height:360px;
      border-radius:50%;
      filter:blur(86px);
      pointer-events:none;
      z-index:0;
      opacity:.42;
      animation:floaty 11s ease-in-out infinite alternate;
    }

    .glow.a{
      left:-120px;
      top:-90px;
      background:rgba(88,168,255,0.18);
    }

    .glow.b{
      right:-120px;
      bottom:-120px;
      background:rgba(159,140,255,0.15);
      animation-duration:13s;
    }

    @keyframes floaty{
      from{transform:translate(0,0) scale(1)}
      to{transform:translate(42px,28px) scale(1.13)}
    }

    .app{
      width:100%;
      max-width:470px;
      position:relative;
      z-index:1;
    }

    .shell{
      position:relative;
      overflow:hidden;
      background:linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.04));
      border:1px solid var(--stroke);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    .shell::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:linear-gradient(180deg, rgba(255,255,255,0.05), transparent 18%);
    }

    /* HERO */
    .hero{
      padding:24px 18px 10px;
      text-align:center;
    }

    .hero-badge{
      margin:0 auto 22px;
      width:min(100%, 380px);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      padding:12px 18px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.14);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        0 10px 30px rgba(0,0,0,0.24);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      font-size:.80rem;
      font-weight:800;
      letter-spacing:2.2px;
      color:rgba(255,255,255,0.84);
    }

    .hero-badge .dot{
      width:16px;
      height:16px;
      border-radius:50%;
      background:linear-gradient(145deg, #ff8a3d, #ffca5f);
      box-shadow:0 0 18px rgba(255,170,70,0.45);
      flex:0 0 auto;
    }

    .hero-title{
      margin:0;
      font-size:clamp(3rem, 12vw, 5rem);
      line-height:0.98;
      font-weight:900;
      letter-spacing:1px;
      background:linear-gradient(90deg, #eef3ff 0%, #c2bbff 42%, #5ca7ff 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      text-shadow:0 0 24px rgba(140,140,255,0.18);
      animation:titleGlow 3.2s ease-in-out infinite alternate;
    }

    @keyframes titleGlow{
      from{filter:brightness(1)}
      to{filter:brightness(1.16)}
    }

    .hero-brand{
      margin-top:18px;
      font-size:.98rem;
      font-weight:800;
      letter-spacing:3px;
      color:rgba(255,255,255,0.72);
    }

    /* MACHINE */
    .machine-box{
      margin:16px 18px 0;
      padding:18px 16px 22px;
      border-radius:26px;
      background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border:1px solid rgba(255,255,255,0.08);
      position:relative;
      overflow:hidden;
    }

    .machine-box::before{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      border-radius:50%;
      background:rgba(88,168,255,0.10);
      filter:blur(36px);
      top:-30px;
      left:-20px;
    }

    .machine-wrap{
      position:relative;
      width:230px;
      height:262px;
      margin:0 auto 16px;
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }

    .machine-base{
      position:absolute;
      bottom:18px;
      width:132px;
      height:24px;
      border-radius:999px;
      background:linear-gradient(180deg,#495163,#151924);
      box-shadow:0 12px 24px rgba(0,0,0,.42);
      z-index:1;
    }

    .machine-stand{
      position:absolute;
      bottom:38px;
      width:34px;
      height:44px;
      border-radius:10px;
      background:linear-gradient(180deg,#6e7787,#2a303b);
      z-index:1;
    }

    .sphere{
      position:absolute;
      top:0;
      width:192px;
      height:192px;
      border-radius:50%;
      z-index:3;
      overflow:hidden;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.82), rgba(255,255,255,.18) 20%, rgba(255,255,255,.08) 33%, rgba(0,0,0,.18) 72%),
        linear-gradient(145deg, #f1f4f9 0%, #9099ab 35%, #4b5363 68%, #cbb17a 100%);
      box-shadow:
        inset 10px 10px 22px rgba(255,255,255,.18),
        inset -15px -16px 28px rgba(0,0,0,.28),
        0 0 28px rgba(90,167,255,.18),
        0 24px 40px rgba(0,0,0,.35);
    }

    .sphere::before,
    .sphere::after{
      content:"";
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,.07);
    }

    .sphere::before{
      width:110px;
      height:110px;
      top:18px;
      left:18px;
    }

    .sphere::after{
      width:56px;
      height:56px;
      right:18px;
      bottom:18px;
    }

    .core{
      position:absolute;
      top:28px;
      width:136px;
      height:136px;
      border-radius:50%;
      z-index:4;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,255,255,.11);
      background:radial-gradient(circle, rgba(255,255,255,.10), rgba(255,255,255,.03));
      box-shadow:inset 0 0 26px rgba(255,255,255,.06);
    }

    .core-text{
      font-size:1rem;
      font-weight:900;
      letter-spacing:1.4px;
      text-transform:uppercase;
      text-align:center;
      color:#fff;
      text-shadow:0 4px 16px rgba(0,0,0,.24);
    }

    .chamber-balls{
      position:absolute;
      top:16px;
      width:176px;
      height:176px;
      z-index:3;
      border-radius:50%;
      pointer-events:none;
    }

    .mini-ball{
      position:absolute;
      width:22px;
      height:22px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:.62rem;
      font-weight:900;
      color:#fff;
      box-shadow:
        inset 3px 3px 6px rgba(255,255,255,.18),
        inset -3px -3px 6px rgba(0,0,0,.2);
    }

    .mini-ball:nth-child(1){left:18px;top:76px;background:linear-gradient(145deg,#ffcf5a,#ee9b00)}
    .mini-ball:nth-child(2){left:52px;top:32px;background:linear-gradient(145deg,#77c8ff,#3a79ff)}
    .mini-ball:nth-child(3){right:40px;top:42px;background:linear-gradient(145deg,#f3f5f9,#7e8796);color:#111}
    .mini-ball:nth-child(4){right:20px;top:86px;background:linear-gradient(145deg,#3ce7aa,#0d9a6b)}
    .mini-ball:nth-child(5){left:64px;bottom:26px;background:linear-gradient(145deg,#ff7c87,#ff4264)}

    .slot{
      position:absolute;
      top:188px;
      width:120px;
      height:18px;
      border-radius:999px;
      background:linear-gradient(180deg,#1f2430,#0d1017);
      border:1px solid rgba(255,255,255,.06);
      z-index:2;
      box-shadow:inset 0 3px 8px rgba(255,255,255,.04), 0 10px 18px rgba(0,0,0,.24);
    }

    .drop-lane{
      position:absolute;
      top:202px;
      width:180px;
      height:38px;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      gap:8px;
      z-index:2;
      pointer-events:none;
    }

    .drop-ball{
      width:28px;
      height:28px;
      border-radius:50%;
      opacity:0;
      transform:translateY(-40px) scale(.65);
      animation:dropOut .42s cubic-bezier(.2,.9,.2,1.1) forwards;
      box-shadow:
        inset 4px 4px 7px rgba(255,255,255,.2),
        inset -4px -4px 7px rgba(0,0,0,.22),
        0 8px 12px rgba(0,0,0,.22);
    }

    @keyframes dropOut{
      0%{opacity:0;transform:translateY(-38px) scale(.65)}
      60%{opacity:1;transform:translateY(4px) scale(1.04)}
      100%{opacity:1;transform:translateY(0) scale(1)}
    }

    .spin .sphere{animation:spin 1.12s linear infinite}
    .spin .core{animation:pulse 1.05s ease-in-out infinite}
    .spin .mini-ball{animation:orbit 1.2s linear infinite}

    @keyframes spin{
      from{transform:rotate(0deg)}
      to{transform:rotate(360deg)}
    }

    @keyframes pulse{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.04)}
    }

    @keyframes orbit{
      0%{transform:translateY(0) scale(1)}
      50%{transform:translateY(-4px) scale(1.04)}
      100%{transform:translateY(0) scale(1)}
    }

    .status{
      min-height:20px;
      text-align:center;
      color:rgba(255,255,255,.72);
      font-size:.84rem;
      letter-spacing:.2px;
    }

    .balls{
      min-height:74px;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-wrap:wrap;
      gap:10px;
      padding:10px 18px 0;
    }

    .ball{
      width:56px;
      height:56px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.03rem;
      font-weight:900;
      color:#fff;
      opacity:0;
      transform:scale(.28) translateY(16px);
      animation:pop .42s cubic-bezier(.2,.9,.2,1.1) forwards;
      box-shadow:
        inset 8px 8px 14px rgba(255,255,255,.24),
        inset -10px -10px 16px rgba(0,0,0,.22),
        0 10px 18px rgba(0,0,0,.26);
    }

    .c1{background:linear-gradient(145deg,#ffcf5a,#ee9b00)}
    .c2{background:linear-gradient(145deg,#77c8ff,#3a79ff)}
    .c3{background:linear-gradient(145deg,#f3f5f9,#7e8796); color:#111}
    .c4{background:linear-gradient(145deg,#3ce7aa,#0d9a6b)}
    .c5{background:linear-gradient(145deg,#ff7c87,#ff4264)}

    @keyframes pop{
      0%{opacity:0;transform:scale(.25) translateY(18px)}
      65%{opacity:1;transform:scale(1.07) translateY(-4px)}
      100%{opacity:1;transform:scale(1) translateY(0)}
    }

    /* INFO */
    .info-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      padding:16px 18px 0;
    }

    .card{
      background:var(--panel);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:22px;
      padding:14px 14px;
      position:relative;
      overflow:hidden;
    }

    .card.full{
      grid-column:1 / -1;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.04), transparent 28%);
      pointer-events:none;
    }

    .label{
      display:block;
      font-size:.76rem;
      color:rgba(255,255,255,.54);
      margin-bottom:7px;
      letter-spacing:.3px;
    }

    .value{
      font-size:1rem;
      font-weight:800;
      line-height:1.45;
      word-break:keep-all;
    }

    /* ACTIONS */
    .actions{
      padding:16px 18px 8px;
    }

    .row{
      display:grid;
      gap:10px;
      margin-bottom:10px;
    }

    .row.two{grid-template-columns:1fr 1fr}
    .row.three{grid-template-columns:1fr 1fr 1fr}

    button{
      appearance:none;
      border:none;
      border-radius:18px;
      padding:15px 14px;
      cursor:pointer;
      color:#fff;
      font-size:.94rem;
      font-weight:900;
      letter-spacing:.15px;
      transition:transform .16s ease, opacity .16s ease, filter .16s ease, box-shadow .16s ease;
    }

    button:active{transform:scale(.976)}
    button:disabled{opacity:.58;cursor:not-allowed}

    .primary{
      background:linear-gradient(135deg,#d8b36d,#8f6d35);
      box-shadow:0 14px 26px rgba(143,109,53,.30);
      color:#101318;
    }

    .secondary{
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,.09);
    }

    .accent{
      background:linear-gradient(135deg,#8aa6d9,#5b6f94);
    }

    .mini{
      padding:13px 12px;
      font-size:.83rem;
      border-radius:15px;
    }

    /* RESULT CARD */
    .result-card-wrap{
      padding:8px 18px 8px;
    }

    .result-card{
      border-radius:28px;
      overflow:hidden;
      padding:18px;
      background:
        radial-gradient(circle at 0% 0%, rgba(216,179,109,.14), transparent 30%),
        radial-gradient(circle at 100% 100%, rgba(88,168,255,.10), transparent 28%),
        linear-gradient(145deg,#0f1218 0%, #171c26 50%, #11151d 100%);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 18px 42px rgba(0,0,0,.32);
    }

    .result-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:14px;
    }

    .result-title{
      margin:0 0 5px;
      font-size:1.1rem;
      font-weight:900;
    }

    .result-sub{
      margin:0;
      font-size:.81rem;
      line-height:1.45;
      color:rgba(255,255,255,.64);
    }

    .tag{
      padding:8px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      font-size:.72rem;
      font-weight:800;
      white-space:nowrap;
    }

    .card-balls{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .card-ball{
      width:48px;
      height:48px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:.94rem;
      font-weight:900;
      color:#fff;
      box-shadow:
        inset 6px 6px 12px rgba(255,255,255,.22),
        inset -8px -8px 12px rgba(0,0,0,.22),
        0 8px 14px rgba(0,0,0,.24);
    }

    .meta{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:12px;
    }

    .meta-box,.message-box{
      border-radius:18px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      padding:12px 13px;
    }

    .meta-label{
      font-size:.72rem;
      color:rgba(255,255,255,.55);
      margin-bottom:6px;
    }

    .meta-value{
      font-size:.94rem;
      font-weight:800;
      line-height:1.4;
    }

    .message-box{
      font-size:.91rem;
      line-height:1.6;
      color:rgba(255,255,255,.9);
    }

    /* HISTORY */
    .history{
      padding:12px 18px 18px;
    }

    .history-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
      gap:12px;
    }

    .history-head h3{
      margin:0;
      font-size:.98rem;
      font-weight:900;
    }

    .text-btn{
      background:none;
      border:none;
      padding:0;
      color:rgba(255,255,255,.58);
      font-size:.78rem;
      font-weight:800;
      cursor:pointer;
    }

    .history-list{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .history-item{
      padding:13px 14px;
      border-radius:16px;
      background:var(--panel-2);
      border:1px solid rgba(255,255,255,.08);
      font-size:.87rem;
      line-height:1.55;
      color:rgba(255,255,255,.84);
    }

    .history-top{
      font-weight:900;
      margin-bottom:4px;
      letter-spacing:.18px;
    }

    /* FOOTER */
    .footer{
      padding:0 18px 18px;
      text-align:center;
      color:rgba(255,255,255,.46);
      font-size:.79rem;
      line-height:1.5;
    }

    .footer .id{
      display:block;
      margin-top:4px;
      color:rgba(255,255,255,.66);
      font-weight:800;
      letter-spacing:.4px;
    }

    /* CAPTURE MODE */
    .capture-mode .machine-box,
    .capture-mode .info-grid,
    .capture-mode .actions,
    .capture-mode .history,
    .capture-mode .footer{
      display:none;
    }

    .capture-mode .hero{
      padding-bottom:0;
    }

    .capture-mode .result-card-wrap{
      padding:14px 16px 18px;
    }

    .capture-mode .result-card{
      min-height:76vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    /* TOAST */
    .toast{
      position:fixed;
      left:50%;
      bottom:24px;
      transform:translateX(-50%) translateY(16px);
      padding:12px 16px;
      border-radius:999px;
      background:rgba(10,12,18,.88);
      border:1px solid rgba(255,255,255,.10);
      color:#fff;
      font-size:.83rem;
      font-weight:800;
      opacity:0;
      pointer-events:none;
      transition:all .24s ease;
      z-index:99;
      box-shadow:0 16px 32px rgba(0,0,0,.35);
      backdrop-filter:blur(8px);
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    @media (max-width:420px){
      .hero-badge{
        font-size:.74rem;
        letter-spacing:1.8px;
      }

      .hero-brand{
        font-size:.90rem;
        letter-spacing:2.4px;
      }

      .machine-wrap{
        width:210px;
        height:246px;
      }

      .sphere{
        width:176px;
        height:176px;
      }

      .core{
        width:130px;
        height:130px;
        top:23px;
      }

      .chamber-balls{
        width:162px;
        height:162px;
        top:14px;
      }

      .slot{top:176px}
      .drop-lane{top:190px}

      .row.three{
        grid-template-columns:1fr 1fr;
      }

      .row.three button:last-child{
        grid-column:1 / -1;
      }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow a"></div>
  <div class="glow b"></div>

  <div class="app">
    <div class="shell" id="shell">

      <section class="hero">
        <div class="hero-badge">
          <span class="dot"></span>
          <span>HIGH-END LOTTO MACHINE</span>
        </div>

        <h1 class="hero-title">LUCK SPHERE</h1>
        <div class="hero-brand">@SOOWAN_JOGUN</div>
      </section>

      <section class="machine-box">
        <div class="machine-wrap" id="machineWrap">
          <div class="machine-base"></div>
          <div class="machine-stand"></div>

          <div class="sphere"></div>

          <div class="chamber-balls">
            <div class="mini-ball">7</div>
            <div class="mini-ball">2</div>
            <div class="mini-ball">9</div>
            <div class="mini-ball">4</div>
            <div class="mini-ball">1</div>
          </div>

          <div class="core">
            <div class="core-text" id="coreText">LUCK READY</div>
          </div>

          <div class="slot"></div>
          <div class="drop-lane" id="dropLane"></div>
        </div>

        <div class="status" id="status">
          버튼을 누르면 오늘의 럭 조합이 시작됩니다
        </div>
      </section>

      <section class="balls" id="balls"></section>

      <section class="info-grid">
        <div class="card">
          <span class="label">오늘의 행운 컬러</span>
          <div class="value" id="luckyColor">준비중</div>
        </div>

        <div class="card">
          <span class="label">행운 시간</span>
          <div class="value" id="luckyTime">준비중</div>
        </div>

        <div class="card full">
          <span class="label">오늘의 메시지</span>
          <div class="value" id="fortuneMessage">
            행운 추첨을 시작해 오늘의 흐름을 확인하세요
          </div>
        </div>
      </section>

      <section class="actions">
        <div class="row two">
          <button class="primary" id="drawBtn">행운 추첨 시작</button>
          <button class="secondary" id="resetBtn">초기화</button>
        </div>

        <div class="row three">
          <button class="secondary mini" id="copyBtn">결과 복사</button>
          <button class="accent mini" id="shareBtn">공유하기</button>
          <button class="secondary mini" id="captureBtn">카드 모드</button>
        </div>
      </section>

      <section class="result-card-wrap">
        <div class="result-card">
          <div class="result-head">
            <div>
              <h2 class="result-title">오늘의 럭 카드</h2>
              <p class="result-sub">결과를 깔끔하게 정리한 공유용 카드</p>
            </div>
            <div class="tag">LUCK SPHERE</div>
          </div>

          <div class="card-balls" id="cardBalls">
            <div class="card-ball" style="background:linear-gradient(145deg,#5d6574,#343c4a)">--</div>
            <div class="card-ball" style="background:linear-gradient(145deg,#5d6574,#343c4a)">--</div>
            <div class="card-ball" style="background:linear-gradient(145deg,#5d6574,#343c4a)">--</div>
            <div class="card-ball" style="background:linear-gradient(145deg,#5d6574,#343c4a)">--</div>
            <div class="card-ball" style="background:linear-gradient(145deg,#5d6574,#343c4a)">--</div>
          </div>

          <div class="meta">
            <div class="meta-box">
              <div class="meta-label">행운 컬러</div>
              <div class="meta-value" id="cardColor">준비중</div>
            </div>

            <div class="meta-box">
              <div class="meta-label">행운 시간</div>
              <div class="meta-value" id="cardTime">준비중</div>
            </div>
          </div>

          <div class="message-box" id="cardMessage">
            결과가 아직 없습니다. 추첨을 시작해 주세요.
          </div>
        </div>
      </section>

      <section class="history">
        <div class="history-head">
          <h3>최근 결과</h3>
          <button class="text-btn" id="clearHistoryBtn">기록 삭제</button>
        </div>
        <div class="history-list" id="historyList"></div>
      </section>

      <footer class="footer">
        LUCK SPHERE
        <span class="id">@SOOWAN_JOGUN</span>
      </footer>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const shell = document.getElementById('shell');
    const machineWrap = document.getElementById('machineWrap');
    const coreText = document.getElementById('coreText');
    const statusEl = document.getElementById('status');
    const ballsEl = document.getElementById('balls');
    const dropLane = document.getElementById('dropLane');

    const luckyColorEl = document.getElementById('luckyColor');
    const luckyTimeEl = document.getElementById('luckyTime');
    const fortuneMessageEl = document.getElementById('fortuneMessage');

    const cardBallsEl = document.getElementById('cardBalls');
    const cardColorEl = document.getElementById('cardColor');
    const cardTimeEl = document.getElementById('cardTime');
    const cardMessageEl = document.getElementById('cardMessage');

    const drawBtn = document.getElementById('drawBtn');
    const resetBtn = document.getElementById('resetBtn');
    const copyBtn = document.getElementById('copyBtn');
    const shareBtn = document.getElementById('shareBtn');
    const captureBtn = document.getElementById('captureBtn');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const historyList = document.getElementById('historyList');
    const toast = document.getElementById('toast');

    const HISTORY_KEY = 'luck_sphere_history_v3';

    const luckyColors = [
      'Gold', 'Silver', 'Midnight Blue', 'Emerald', 'Ivory',
      'Graphite', 'Royal Purple', 'Champagne', 'Sky Blue', 'Black'
    ];

    const luckyTimes = [
      '07:07', '09:21', '11:11', '13:33', '15:15',
      '17:27', '19:00', '20:22', '21:45', '23:09'
    ];

    const fortuneMessages = [
      '오늘은 타이밍이 중요한 하루입니다. 서두르기보다 흐름을 보세요.',
      '가벼운 선택이 생각보다 좋은 연결로 이어질 수 있습니다.',
      '오늘의 행운은 크게 오기보다 조용히 들어오는 편입니다.',
      '무리하지 않는 판단이 오히려 가장 강한 선택이 됩니다.',
      '조금 늦게 시작해도 결과는 충분히 따라옵니다.',
      '오늘은 사람보다 순서와 리듬을 맞추는 것이 더 중요합니다.',
      '사소한 우연이 기분 좋은 결과로 연결될 수 있습니다.',
      '직감이 평소보다 선명하게 작동하는 하루입니다.',
      '한 번 더 시도한 선택에서 좋은 흐름이 열릴 수 있습니다.',
      '오늘은 과감함보다 정교함이 더 잘 먹히는 날입니다.'
    ];

    let currentResult = null;
    let isDrawing = false;
    let captureMode = false;

    function showToast(msg){
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function delay(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function randomItem(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function generateNumbers(){
      const nums = [];
      while(nums.length < 5){
        const n = Math.floor(Math.random() * 45) + 1;
        if(!nums.includes(n)) nums.push(n);
      }
      return nums.sort((a,b) => a - b);
    }

    function fmt(n){
      return String(n).padStart(2, '0');
    }

    function ballClass(i){
      return ['c1','c2','c3','c4','c5'][i % 5];
    }

    function ballHTML(num, idx){
      return `<div class="ball ${ballClass(idx)}">${fmt(num)}</div>`;
    }

    function cardBallHTML(num, idx){
      const styles = [
        'linear-gradient(145deg,#ffcf5a,#ee9b00)',
        'linear-gradient(145deg,#77c8ff,#3a79ff)',
        'linear-gradient(145deg,#f3f5f9,#7e8796);color:#111',
        'linear-gradient(145deg,#3ce7aa,#0d9a6b)',
        'linear-gradient(145deg,#ff7c87,#ff4264)'
      ];
      return `<div class="card-ball" style="background:${styles[idx % 5]}">${fmt(num)}</div>`;
    }

    function dropBallHTML(idx){
      return `<div class="drop-ball ${ballClass(idx)}"></div>`;
    }

    function getAudioContext(){
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if(!Ctx) return null;
      if(!getAudioContext.ctx) getAudioContext.ctx = new Ctx();
      return getAudioContext.ctx;
    }

    function beep({freq=440,duration=0.08,type='sine',volume=0.03}={}){
      const ctx = getAudioContext();
      if(!ctx) return;
      if(ctx.state === 'suspended') ctx.resume();

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = volume;

      osc.connect(gain);
      gain.connect(ctx.destination);

      const now = ctx.currentTime;
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      osc.start(now);
      osc.stop(now + duration);
    }

    function playStartSound(){
      beep({freq:240,duration:0.09,type:'triangle',volume:0.026});
      setTimeout(() => beep({freq:340,duration:0.10,type:'triangle',volume:0.026}), 80);
      setTimeout(() => beep({freq:480,duration:0.12,type:'triangle',volume:0.028}), 170);
    }

    function playBallSound(i){
      const seq = [520, 620, 720, 840, 960];
      beep({freq:seq[i % seq.length],duration:0.075,type:'sine',volume:0.026});
    }

    function playDoneSound(){
      beep({freq:560,duration:0.10,type:'triangle',volume:0.028});
      setTimeout(() => beep({freq:760,duration:0.12,type:'triangle',volume:0.03}), 90);
      setTimeout(() => beep({freq:980,duration:0.14,type:'triangle',volume:0.03}), 190);
    }

    function resetCardPlaceholders(){
      cardBallsEl.innerHTML = `
        <div class="card-ball" style="background:linear-gradient(145deg,#5d6574,#343c4a)">--</div>
        <div class="card-ball" style="background:linear-gradient(145deg,#5d6574,#343c4a)">--</div>
        <div class="card-ball" style="background:linear-gradient(145deg,#5d6574,#343c4a)">--</div>
        <div class="card-ball" style="background:linear-gradient(145deg,#5d6574,#343c4a)">--</div>
        <div class="card-ball" style="background:linear-gradient(145deg,#5d6574,#343c4a)">--</div>
      `;
      cardColorEl.textContent = '준비중';
      cardTimeEl.textContent = '준비중';
      cardMessageEl.textContent = '결과가 아직 없습니다. 추첨을 시작해 주세요.';
    }

    function resetUI(){
      ballsEl.innerHTML = '';
      dropLane.innerHTML = '';
      luckyColorEl.textContent = '준비중';
      luckyTimeEl.textContent = '준비중';
      fortuneMessageEl.textContent = '행운 추첨을 시작해 오늘의 흐름을 확인하세요';
      statusEl.textContent = '버튼을 누르면 오늘의 럭 조합이 시작됩니다';
      coreText.textContent = 'LUCK READY';
      resetCardPlaceholders();
      currentResult = null;
    }

    function updateCard(result){
      cardBallsEl.innerHTML = result.numbers.map((n, i) => cardBallHTML(n, i)).join('');
      cardColorEl.textContent = result.color;
      cardTimeEl.textContent = result.time;
      cardMessageEl.textContent = result.message;
    }

    function getHistory(){
      try{
        return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
      }catch(e){
        return [];
      }
    }

    function saveHistory(item){
      const list = getHistory();
      list.unshift(item);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(list.slice(0, 6)));
      renderHistory();
    }

    function renderHistory(){
      const list = getHistory();
      historyList.innerHTML = '';

      if(!list.length){
        historyList.innerHTML = `<div class="history-item">아직 저장된 결과가 없습니다.</div>`;
        return;
      }

      list.forEach(item => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `
          <div class="history-top">${item.numbers.map(fmt).join(' · ')}</div>
          <div>${item.color} / ${item.time}</div>
          <div>${item.message}</div>
        `;
        historyList.appendChild(div);
      });
    }

    function getResultText(){
      if(!currentResult) return '아직 결과가 없습니다.';

      return [
        'LUCK SPHERE',
        `번호: ${currentResult.numbers.map(fmt).join(' ')}`,
        `행운 컬러: ${currentResult.color}`,
        `행운 시간: ${currentResult.time}`,
        `메시지: ${currentResult.message}`,
        '@SOOWAN_JOGUN'
      ].join('\n');
    }

    async function copyResult(){
      if(!currentResult){
        showToast('먼저 추첨을 진행해 주세요');
        return;
      }

      const text = getResultText();

      try{
        await navigator.clipboard.writeText(text);
        showToast('결과를 복사했습니다');
      }catch(e){
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
        showToast('결과를 복사했습니다');
      }
    }

    async function shareResult(){
      if(!currentResult){
        showToast('먼저 추첨을 진행해 주세요');
        return;
      }

      const text = getResultText();

      if(navigator.share){
        try{
          await navigator.share({
            title:'LUCK SPHERE',
            text
          });
        }catch(e){}
      }else{
        copyResult();
      }
    }

    function toggleCaptureMode(){
      captureMode = !captureMode;
      shell.classList.toggle('capture-mode', captureMode);
      captureBtn.textContent = captureMode ? '기본 모드' : '카드 모드';
      showToast(captureMode ? '결과 카드 모드로 전환했습니다' : '기본 화면으로 돌아왔습니다');
    }

    async function showDropEffect(idx){
      const wrap = document.createElement('div');
      wrap.innerHTML = dropBallHTML(idx);
      dropLane.appendChild(wrap.firstElementChild);
      await delay(120);
    }

    async function drawLuck(){
      if(isDrawing) return;

      isDrawing = true;
      drawBtn.disabled = true;

      ballsEl.innerHTML = '';
      dropLane.innerHTML = '';
      luckyColorEl.textContent = '추첨중...';
      luckyTimeEl.textContent = '추첨중...';
      fortuneMessageEl.textContent = '행운 흐름을 분석중입니다...';
      statusEl.textContent = '추첨기가 회전하는 중입니다';
      coreText.textContent = 'DRAWING';
      machineWrap.classList.add('spin');

      playStartSound();
      await delay(1450);

      const numbers = generateNumbers();
      const color = randomItem(luckyColors);
      const time = randomItem(luckyTimes);
      const message = randomItem(fortuneMessages);

      ballsEl.innerHTML = '';
      dropLane.innerHTML = '';

      for(let i = 0; i < numbers.length; i++){
        await showDropEffect(i);

        const wrap = document.createElement('div');
        wrap.innerHTML = ballHTML(numbers[i], i);
        ballsEl.appendChild(wrap.firstElementChild);

        playBallSound(i);
        statusEl.textContent = `${i + 1}번째 번호가 등장했습니다`;
        await delay(230);
      }

      luckyColorEl.textContent = color;
      luckyTimeEl.textContent = time;
      fortuneMessageEl.textContent = message;

      currentResult = {
        numbers,
        color,
        time,
        message,
        createdAt: Date.now()
      };

      updateCard(currentResult);
      saveHistory(currentResult);

      machineWrap.classList.remove('spin');
      coreText.textContent = 'LUCK OPEN';
      statusEl.textContent = '오늘의 럭 조합이 완성되었습니다';

      playDoneSound();

      drawBtn.disabled = false;
      isDrawing = false;
    }

    drawBtn.addEventListener('click', drawLuck);

    resetBtn.addEventListener('click', () => {
      if(isDrawing) return;
      resetUI();
      showToast('화면을 초기화했습니다');
    });

    copyBtn.addEventListener('click', copyResult);
    shareBtn.addEventListener('click', shareResult);
    captureBtn.addEventListener('click', toggleCaptureMode);

    clearHistoryBtn.addEventListener('click', () => {
      localStorage.removeItem(HISTORY_KEY);
      renderHistory();
      showToast('최근 결과를 삭제했습니다');
    });

    renderHistory();
    resetUI();
  </script>
</body>
</html>
