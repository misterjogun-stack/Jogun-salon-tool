<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추천기</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6fb;
      color: #111827;
    }
    .container {
      max-width: 920px;
      margin: 40px auto;
      padding: 20px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }
    .desc {
      margin-bottom: 24px;
      color: #4b5563;
      line-height: 1.6;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
    }
    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }
    .hint {
      margin-top: 10px;
      color: #6b7280;
      font-size: 14px;
    }
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .primary {
      background: #2563eb;
      color: #fff;
    }
    .secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .message {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }
    .message.error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    .message.success {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }
    h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }
    .empty {
      color: #6b7280;
      padding: 10px 0;
    }
    .result-row, .history-item {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      background: #fafafa;
    }
    .result-head, .history-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      font-size: 14px;
      color: #4b5563;
    }
    .balls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .ball {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 15px;
      box-shadow: inset 0 -3px 0 rgba(0,0,0,0.12);
    }
    .yellow { background: #f59e0b; }
    .blue   { background: #3b82f6; }
    .red    { background: #ef4444; }
    .gray   { background: #6b7280; }
    .green  { background: #10b981; }

    .history-time {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .history-set {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .history-set span {
      min-width: 52px;
      font-size: 14px;
      color: #374151;
      font-weight: 700;
    }

    @media (max-width: 640px) {
      .container { margin: 20px auto; padding: 14px; }
      h1 { font-size: 26px; }
      .ball {
        width: 38px;
        height: 38px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>로또 번호 추천기</h1>
    <p class="desc">
      1~45 중 중복 없이 6개를 추천합니다.
      고정 번호를 넣으면 반자동 추천, 제외 번호를 넣으면 원하는 조건으로 조합할 수 있습니다.
    </p>

    <div class="card">
      <div class="grid">
        <div>
          <label for="setCount">몇 세트 생성할까?</label>
          <input id="setCount" type="number" min="1" max="10" value="5" />
        </div>

        <div>
          <label for="fixedInput">고정 번호</label>
          <input id="fixedInput" type="text" placeholder="예: 3, 11, 27" />
        </div>

        <div>
          <label for="excludeInput">제외 번호</label>
          <input id="excludeInput" type="text" placeholder="예: 7, 14, 28" />
        </div>
      </div>

      <div class="hint">
        쉼표로 구분해서 입력하면 됩니다. 예: 1, 5, 12
      </div>

      <div class="buttons">
        <button id="generateBtn" class="primary">번호 추천</button>
        <button id="clearBtn" class="secondary">기록 지우기</button>
      </div>

      <div id="message"></div>
    </div>

    <div class="card">
      <h2>추천 결과</h2>
      <div id="results" class="empty">아직 생성된 번호가 없습니다.</div>
    </div>

    <div class="card">
      <h2>최근 기록</h2>
      <div id="history" class="empty">저장된 기록이 없습니다.</div>
    </div>
  </div>

  <script>
    const HISTORY_KEY = "lotto_history_v1";

    const setCountInput = document.getElementById("setCount");
    const fixedInput = document.getElementById("fixedInput");
    const excludeInput = document.getElementById("excludeInput");
    const generateBtn = document.getElementById("generateBtn");
    const clearBtn = document.getElementById("clearBtn");
    const resultsEl = document.getElementById("results");
    const historyEl = document.getElementById("history");
    const messageEl = document.getElementById("message");

    function showMessage(text, type = "error") {
      if (!text) {
        messageEl.innerHTML = "";
        return;
      }
      messageEl.innerHTML = `<div class="message ${type}">${text}</div>`;
    }

    function parseNumberList(value) {
      const trimmed = value.trim();
      if (!trimmed) return [];

      const parts = trimmed.split(",").map(v => v.trim()).filter(Boolean);
      const numbers = parts.map(v => Number(v));

      if (numbers.some(n => !Number.isInteger(n) || n < 1 || n > 45)) {
        throw new Error("번호는 1부터 45 사이의 정수만 입력할 수 있습니다.");
      }

      const unique = [...new Set(numbers)];
      if (unique.length !== numbers.length) {
        throw new Error("같은 번호를 중복 입력할 수 없습니다.");
      }

      return unique.sort((a, b) => a - b);
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function generateOneSet(fixed, excluded) {
      if (fixed.length > 6) {
        throw new Error("고정 번호는 최대 6개까지 가능합니다.");
      }

      const overlap = fixed.filter(n => excluded.includes(n));
      if (overlap.length > 0) {
        throw new Error(`고정 번호와 제외 번호가 겹칩니다: ${overlap.join(", ")}`);
      }

      const pool = [];
      for (let n = 1; n <= 45; n++) {
        if (!fixed.includes(n) && !excluded.includes(n)) {
          pool.push(n);
        }
      }

      const needed = 6 - fixed.length;
      if (pool.length < needed) {
        throw new Error("사용 가능한 번호가 부족합니다. 제외 번호를 줄여주세요.");
      }

      const picked = shuffle(pool).slice(0, needed);
      return [...fixed, ...picked].sort((a, b) => a - b);
    }

    function generateMultipleSets(count, fixed, excluded) {
      const seen = new Set();
      const result = [];
      let tries = 0;
      const maxTries = count * 300;

      while (result.length < count && tries < maxTries) {
        const nums = generateOneSet(fixed, excluded);
        const key = nums.join("-");
        if (!seen.has(key)) {
          seen.add(key);
          result.push(nums);
        }
        tries++;
      }

      if (result.length < count) {
        throw new Error("조건이 너무 좁아서 서로 다른 세트를 충분히 만들 수 없습니다.");
      }

      return result;
    }

    function getBallClass(n) {
      if (n <= 10) return "yellow";
      if (n <= 20) return "blue";
      if (n <= 30) return "red";
      if (n <= 40) return "gray";
      return "green";
    }

    function renderBalls(numbers) {
      return `
        <div class="balls">
          ${numbers.map(n => `<span class="ball ${getBallClass(n)}">${n}</span>`).join("")}
        </div>
      `;
    }

    function getMeta(numbers) {
      const sum = numbers.reduce((acc, cur) => acc + cur, 0);
      const odd = numbers.filter(n => n % 2 === 1).length;
      const even = 6 - odd;
      return `합계 ${sum} · 홀짝 ${odd}:${even}`;
    }

    function renderResults(rows) {
      if (!rows.length) {
        resultsEl.className = "empty";
        resultsEl.textContent = "아직 생성된 번호가 없습니다.";
        return;
      }

      resultsEl.className = "";
      resultsEl.innerHTML = rows.map((numbers, index) => `
        <div class="result-row">
          <div class="result-head">
            <strong>${index + 1}세트</strong>
            <span>${getMeta(numbers)}</span>
          </div>
          ${renderBalls(numbers)}
        </div>
      `).join("");
    }

    function loadHistory() {
      try {
        return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function saveHistory(entry) {
      const history = loadHistory();
      history.unshift(entry);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, 10)));
    }

    function renderHistory() {
      const history = loadHistory();

      if (!history.length) {
        historyEl.className = "empty";
        historyEl.textContent = "저장된 기록이 없습니다.";
        return;
      }

      historyEl.className = "";
      historyEl.innerHTML = history.map(item => `
        <div class="history-item">
          <div class="history-time">${item.time}</div>
          ${item.rows.map((numbers, index) => `
            <div class="history-set">
              <span>${index + 1}세트</span>
              ${renderBalls(numbers)}
            </div>
          `).join("")}
        </div>
      `).join("");
    }

    generateBtn.addEventListener("click", () => {
      try {
        showMessage("");

        const count = Number(setCountInput.value);
        if (!Number.isInteger(count) || count < 1 || count > 10) {
          throw new Error("세트 수는 1~10 사이로 입력해 주세요.");
        }

        const fixed = parseNumberList(fixedInput.value);
        const excluded = parseNumberList(excludeInput.value);

        const rows = generateMultipleSets(count, fixed, excluded);
        renderResults(rows);

        saveHistory({
          time: new Date().toLocaleString("ko-KR"),
          rows
        });

        renderHistory();
        showMessage(`${rows.length}세트를 생성했습니다.`, "success");
      } catch (error) {
        showMessage(error.message, "error");
      }
    });

    clearBtn.addEventListener("click", () => {
      localStorage.removeItem(HISTORY_KEY);
      renderHistory();
      showMessage("저장된 기록을 지웠습니다.", "success");
    });

    renderHistory();
  </script>
</body>
</html>
