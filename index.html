<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="jogun 로또번호 추첨기" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="jogun lotto" />

  <title>jogun lotto</title>

  <style>
    :root {
      --bg: #020617;
      --bg-soft: rgba(15, 23, 42, 0.78);
      --card: rgba(15, 23, 42, 0.92);
      --text: #e5eefb;
      --muted: #94a3b8;
      --line: rgba(148, 163, 184, 0.14);
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.34);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 28%),
        radial-gradient(circle at bottom, rgba(34, 197, 94, 0.16), transparent 28%),
        linear-gradient(180deg, #020617 0%, #08111f 100%);
      color: var(--text);
      font-family:
        "Pretendard Variable",
        "Pretendard",
        "Apple SD Gothic Neo",
        "Noto Sans KR",
        "Segoe UI",
        sans-serif;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      justify-content: center;
      padding:
        calc(14px + var(--safe-top))
        calc(14px + var(--safe-right))
        calc(18px + var(--safe-bottom))
        calc(14px + var(--safe-left));
    }

    button,
    select {
      font: inherit;
    }

    .app {
      width: min(100%, 480px);
      display: grid;
      gap: 14px;
    }

    .glass {
      background: var(--bg-soft);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      padding: 22px 18px 18px;
      background:
        linear-gradient(145deg, rgba(56, 189, 248, 0.16), rgba(34, 197, 94, 0.1)),
        var(--card);
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.65;
      filter: blur(8px);
    }

    .hero::before {
      width: 120px;
      height: 120px;
      top: -36px;
      right: -30px;
      background: rgba(56, 189, 248, 0.24);
    }

    .hero::after {
      width: 88px;
      height: 88px;
      bottom: -24px;
      left: -18px;
      background: rgba(34, 197, 94, 0.2);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      color: #dbeafe;
      background: rgba(255, 255, 255, 0.06);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .hero h1 {
      margin: 14px 0 6px;
      font-size: clamp(30px, 8vw, 40px);
      line-height: 1.02;
      letter-spacing: -0.05em;
    }

    .hero .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }

    .panel,
    .result-card {
      border-radius: var(--radius-xl);
      padding: 16px;
    }

    .panel-header,
    .result-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .panel-title {
      font-size: 17px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .subtle {
      color: var(--muted);
      font-size: 12px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 800;
    }

    .select {
      appearance: none;
      width: 100%;
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 0 14px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02)),
        #0f172a;
      color: var(--text);
      outline: none;
    }

    .select:focus {
      border-color: rgba(56, 189, 248, 0.72);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .btn {
      min-height: 54px;
      border: 0;
      border-radius: 18px;
      padding: 0 14px;
      font-weight: 900;
      letter-spacing: -0.02em;
      cursor: pointer;
      transition: transform 0.16s ease, opacity 0.16s ease, filter 0.16s ease;
      touch-action: manipulation;
      user-select: none;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      color: #001018;
      background: linear-gradient(135deg, #67e8f9, #38bdf8 52%, #22c55e);
      box-shadow: 0 16px 32px rgba(34, 197, 94, 0.16);
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
    }

    .btn-install {
      color: #d8fef0;
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.24);
    }

    .btn[hidden] {
      display: none;
    }

    .status {
      margin-top: 12px;
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.1);
      color: #bfe8ff;
      font-size: 12px;
      font-weight: 900;
    }

    .result-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .history {
      display: grid;
      gap: 10px;
    }

    .history-item {
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .balls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .ball {
      position: relative;
      display: grid;
      place-items: center;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      font-weight: 900;
      font-size: clamp(24px, 8vw, 30px);
      letter-spacing: -0.04em;
      color: #fff;
      box-shadow:
        inset 0 -10px 20px rgba(0, 0, 0, 0.18),
        inset 0 8px 12px rgba(255, 255, 255, 0.16),
        0 14px 28px rgba(0, 0, 0, 0.28);
      transform: translateY(8px) scale(0.92);
      opacity: 0;
      animation: pop-in 0.6s forwards;
    }

    .ball::after {
      content: "";
      position: absolute;
      top: 14%;
      left: 18%;
      width: 34%;
      height: 20%;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.22);
      transform: rotate(-20deg);
      filter: blur(1px);
    }

    .ball[data-range="1"],
    .chip[data-range="1"] {
      background: linear-gradient(145deg, #f59e0b, #d97706);
    }

    .ball[data-range="2"],
    .chip[data-range="2"] {
      background: linear-gradient(145deg, #3b82f6, #1d4ed8);
    }

    .ball[data-range="3"],
    .chip[data-range="3"] {
      background: linear-gradient(145deg, #ef4444, #b91c1c);
    }

    .ball[data-range="4"],
    .chip[data-range="4"] {
      background: linear-gradient(145deg, #64748b, #334155);
    }

    .ball[data-range="5"],
    .chip[data-range="5"] {
      background: linear-gradient(145deg, #22c55e, #15803d);
    }

    .ball:nth-child(1) { animation-delay: 0.03s; }
    .ball:nth-child(2) { animation-delay: 0.08s; }
    .ball:nth-child(3) { animation-delay: 0.13s; }
    .ball:nth-child(4) { animation-delay: 0.18s; }
    .ball:nth-child(5) { animation-delay: 0.23s; }
    .ball:nth-child(6) { animation-delay: 0.28s; }

    .insight {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .mini {
      border-radius: 18px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
    }

    .mini strong {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .mini span {
      display: block;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .history-balls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      min-width: 36px;
      height: 36px;
      padding: 0 10px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 900;
      color: #fff;
      box-shadow: inset 0 -6px 10px rgba(0, 0, 0, 0.18);
    }

    .footer {
      display: grid;
      gap: 6px;
      padding-bottom: 4px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    .footer a {
      color: #bfe8ff;
      text-decoration: none;
      font-weight: 800;
    }

    @keyframes pop-in {
      0% {
        opacity: 0;
        transform: translateY(14px) scale(0.86) rotate(-8deg);
      }
      70% {
        opacity: 1;
        transform: translateY(-4px) scale(1.03) rotate(2deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0);
      }
    }

    @media (max-width: 390px) {
      .controls,
      .insight,
      .button-row {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }

      .ball {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="jogun 로또번호 추첨기">
    <section class="hero glass">
      <span class="brand">jogun lotto</span>
      <h1>로또번호<br />추첨기</h1>
      <div class="meta">
        <span>@soowan_jg</span>
        <span id="installGuideText">모바일 홈 화면 설치 지원</span>
      </div>
    </section>

    <section class="panel glass" aria-labelledby="controls-title">
      <div class="panel-header">
        <div>
          <div id="controls-title" class="panel-title">추첨</div>
          <div class="subtle">1~45 / 6개 / 중복 없음</div>
        </div>
      </div>

      <div class="controls">
        <div class="field">
          <label for="mode">방식</label>
          <select id="mode" class="select" aria-label="추천 방식">
            <option value="random">랜덤</option>
            <option value="balanced">균형형</option>
            <option value="spread">분산형</option>
          </select>
        </div>

        <div class="field">
          <label for="sets">게임 수</label>
          <select id="sets" class="select" aria-label="게임 수">
            <option value="1">1게임</option>
            <option value="2">2게임</option>
            <option value="3" selected>3게임</option>
            <option value="4">4게임</option>
            <option value="5">5게임</option>
          </select>
        </div>
      </div>

      <div class="button-row">
        <button id="drawBtn" class="btn btn-primary" type="button">추첨</button>
        <button id="shuffleBtn" class="btn btn-secondary" type="button">다시</button>
        <button id="installBtn" class="btn btn-install" type="button" hidden>설치</button>
      </div>

      <div id="status" class="status" aria-live="polite">준비 완료</div>
    </section>

    <section class="result-card glass" aria-labelledby="result-title">
      <div class="result-top">
        <div>
          <div id="result-title" class="panel-title">결과</div>
          <div id="drawTime" class="result-meta">대기 중</div>
        </div>
        <span class="badge" id="resultBadge">ready</span>
      </div>

      <div id="resultsContainer" class="history" aria-live="polite"></div>

      <div class="insight">
        <div class="mini">
          <strong>합계</strong>
          <span id="sumValue">-</span>
        </div>
        <div class="mini">
          <strong>홀/짝</strong>
          <span id="oddEvenValue">-</span>
        </div>
        <div class="mini">
          <strong>간격</strong>
          <span id="gapValue">-</span>
        </div>
      </div>
    </section>

    <section class="panel glass" aria-labelledby="history-title">
      <div class="panel-header">
        <div>
          <div id="history-title" class="panel-title">기록</div>
          <div class="subtle">최대 10개</div>
        </div>
        <button id="clearBtn" class="btn btn-secondary" type="button" style="min-height: 42px; padding: 0 14px;">
          삭제
        </button>
      </div>
      <div id="historyList" class="history"></div>
    </section>

    <div class="footer">
      <div><a href="https://www.instagram.com/soowan_jg/" target="_blank" rel="noopener noreferrer">@soowan_jg</a></div>
      <div id="iosHint">iPhone: Safari 공유 → 홈 화면에 추가</div>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "jogun-lotto-history-v2";
    const modeEl = document.getElementById("mode");
    const setsEl = document.getElementById("sets");
    const drawBtn = document.getElementById("drawBtn");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const clearBtn = document.getElementById("clearBtn");
    const installBtn = document.getElementById("installBtn");
    const statusEl = document.getElementById("status");
    const drawTimeEl = document.getElementById("drawTime");
    const resultBadgeEl = document.getElementById("resultBadge");
    const resultsContainerEl = document.getElementById("resultsContainer");
    const historyListEl = document.getElementById("historyList");
    const sumValueEl = document.getElementById("sumValue");
    const oddEvenValueEl = document.getElementById("oddEvenValue");
    const gapValueEl = document.getElementById("gapValue");
    const iosHintEl = document.getElementById("iosHint");
    const installGuideTextEl = document.getElementById("installGuideText");

    let deferredPrompt = null;

    function getRangeBucket(value) {
      if (value <= 10) return "1";
      if (value <= 20) return "2";
      if (value <= 30) return "3";
      if (value <= 40) return "4";
      return "5";
    }

    function formatDate(date = new Date()) {
      return new Intl.DateTimeFormat("ko-KR", {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(date);
    }

    function saveHistory(history) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(0, 10)));
    }

    function loadHistory() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function randomInteger(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function uniqueRandomNumbers() {
      const values = new Set();

      while (values.size < 6) {
        values.add(randomInteger(1, 45));
      }

      return [...values].sort((a, b) => a - b);
    }

    function createBalancedNumbers() {
      const ranges = [
        [1, 9],
        [10, 17],
        [18, 25],
        [26, 33],
        [34, 41],
        [42, 45]
      ];
      const values = new Set();

      for (const [start, end] of ranges) {
        let value = randomInteger(start, end);

        while (values.has(value)) {
          value = randomInteger(start, end);
        }

        values.add(value);
      }

      return [...values].sort((a, b) => a - b);
    }

    function createSpreadNumbers() {
      const anchors = [3, 11, 19, 27, 35, 43];
      const values = new Set();

      for (const anchor of anchors) {
        const min = Math.max(1, anchor - 3);
        const max = Math.min(45, anchor + 3);
        let value = randomInteger(min, max);

        while (values.has(value)) {
          value = randomInteger(min, max);
        }

        values.add(value);
      }

      return [...values].sort((a, b) => a - b);
    }

    function generateNumbers(mode) {
      switch (mode) {
        case "balanced":
          return createBalancedNumbers();
        case "spread":
          return createSpreadNumbers();
        default:
          return uniqueRandomNumbers();
      }
    }

    function calculateInsight(numbers) {
      const sum = numbers.reduce((accumulator, current) => accumulator + current, 0);
      const odd = numbers.filter((number) => number % 2 !== 0).length;
      const even = numbers.length - odd;
      const gaps = numbers.slice(1).map((number, index) => number - numbers[index]);
      const averageGap = gaps.length
        ? (gaps.reduce((accumulator, current) => accumulator + current, 0) / gaps.length).toFixed(1)
        : "0.0";

      return {
        sum,
        oddEven: `${odd}:${even}`,
        averageGap
      };
    }

    function createBall(number) {
      const element = document.createElement("div");
      element.className = "ball";
      element.dataset.range = getRangeBucket(number);
      element.textContent = String(number);
      element.setAttribute("aria-label", `${number}번`);
      return element;
    }

    function createChip(number) {
      const element = document.createElement("span");
      element.className = "chip";
      element.dataset.range = getRangeBucket(number);
      element.textContent = String(number);
      element.setAttribute("aria-label", `${number}번`);
      return element;
    }

    function getModeLabel(mode) {
      if (mode === "balanced") return "균형형";
      if (mode === "spread") return "분산형";
      return "랜덤";
    }

    function renderCurrentResults(games) {
      resultsContainerEl.innerHTML = "";

      games.forEach((numbers, index) => {
        const wrapper = document.createElement("article");
        wrapper.className = "history-item";

        const header = document.createElement("div");
        header.className = "history-head";
        header.innerHTML = `
          <strong style="color: var(--text); font-size: 14px;">G${index + 1}</strong>
          <span>${numbers.join(" · ")}</span>
        `;

        const balls = document.createElement("div");
        balls.className = "balls";

        numbers.forEach((number) => {
          balls.appendChild(createBall(number));
        });

        wrapper.append(header, balls);
        resultsContainerEl.appendChild(wrapper);
      });

      const insight = calculateInsight(games[0]);
      sumValueEl.textContent = String(insight.sum);
      oddEvenValueEl.textContent = insight.oddEven;
      gapValueEl.textContent = insight.averageGap;
    }

    function renderHistory() {
      const history = loadHistory();

      if (history.length === 0) {
        historyListEl.innerHTML = `
          <div class="history-item">
            <div class="subtle">기록 없음</div>
          </div>
        `;
        return;
      }

      historyListEl.innerHTML = "";

      history.forEach((entry) => {
        const item = document.createElement("article");
        item.className = "history-item";

        const head = document.createElement("div");
        head.className = "history-head";
        head.innerHTML = `
          <span>${entry.modeLabel} · ${entry.games.length}게임</span>
          <span>${entry.createdAt}</span>
        `;

        const content = document.createElement("div");
        content.className = "history";

        entry.games.forEach((numbers, index) => {
          const row = document.createElement("div");
          row.className = "history-balls";
          row.setAttribute("aria-label", `최근 기록 게임 ${index + 1}`);

          const label = document.createElement("strong");
          label.textContent = `G${index + 1}`;
          label.style.minWidth = "26px";
          label.style.display = "inline-flex";
          label.style.alignItems = "center";
          label.style.color = "var(--muted)";

          row.appendChild(label);

          numbers.forEach((number) => {
            row.appendChild(createChip(number));
          });

          content.appendChild(row);
        });

        item.append(head, content);
        historyListEl.appendChild(item);
      });
    }

    function drawNumbers() {
      const mode = modeEl.value;
      const sets = Number(setsEl.value);
      const games = Array.from({ length: sets }, () => generateNumbers(mode));
      const createdAt = formatDate();

      renderCurrentResults(games);
      drawTimeEl.textContent = createdAt;
      resultBadgeEl.textContent = `${getModeLabel(mode)} · ${sets}`;
      statusEl.textContent = "추첨 완료";

      const history = loadHistory();
      history.unshift({
        mode,
        modeLabel: getModeLabel(mode),
        games,
        createdAt
      });

      saveHistory(history);
      renderHistory();

      if (navigator.vibrate) {
        navigator.vibrate([20, 30, 20]);
      }
    }

    function isIos() {
      return /iphone|ipad|ipod/i.test(window.navigator.userAgent);
    }

    function isInStandaloneMode() {
      return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
    }

    function setupInstallUI() {
      if (isInStandaloneMode()) {
        installGuideTextEl.textContent = "설치 완료";
        iosHintEl.textContent = "홈 화면에서 바로 실행할 수 있습니다";
        return;
      }

      if (isIos()) {
        iosHintEl.textContent = "iPhone: Safari 공유 → 홈 화면에 추가";
      } else {
        iosHintEl.textContent = "Android: 설치 버튼 또는 브라우저 메뉴 사용";
      }
    }

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredPrompt = event;
      installBtn.hidden = false;
      installGuideTextEl.textContent = "설치 가능";
      statusEl.textContent = "설치 버튼이 준비되었습니다";
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) {
        statusEl.textContent = isIos()
          ? "Safari 공유 메뉴에서 홈 화면에 추가하세요"
          : "브라우저 메뉴에서 설치를 선택하세요";
        return;
      }

      deferredPrompt.prompt();
      const choice = await deferredPrompt.userChoice;

      if (choice.outcome === "accepted") {
        statusEl.textContent = "설치가 시작되었습니다";
      } else {
        statusEl.textContent = "설치가 취소되었습니다";
      }

      deferredPrompt = null;
      installBtn.hidden = true;
    });

    window.addEventListener("appinstalled", () => {
      deferredPrompt = null;
      installBtn.hidden = true;
      installGuideTextEl.textContent = "설치 완료";
      statusEl.textContent = "앱이 설치되었습니다";
    });

    drawBtn.addEventListener("click", drawNumbers);
    shuffleBtn.addEventListener("click", drawNumbers);

    clearBtn.addEventListener("click", () => {
      localStorage.removeItem(STORAGE_KEY);
      renderHistory();
      statusEl.textContent = "기록 삭제 완료";
    });

    async function registerServiceWorker() {
      if (!("serviceWorker" in navigator)) {
        return;
      }

      try {
        await navigator.serviceWorker.register("./service-worker.js");
      } catch {
        statusEl.textContent = "서비스 워커 등록 실패";
      }
    }

    window.addEventListener("load", async () => {
      renderHistory();
      renderCurrentResults([generateNumbers("random")]);
      drawTimeEl.textContent = "ready";
      resultBadgeEl.textContent = "preview";
      setupInstallUI();
      await registerServiceWorker();
    });
  </script>
</body>
</html>
