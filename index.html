<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JOGUN 4D LOTTO</title>

<style>

body{
background:#030312;
font-family:Arial;
text-align:center;
color:white;
padding-top:60px;
}

/* 제목 */

.title{
font-size:42px;
font-weight:900;
color:#00eaff;
text-shadow:0 0 20px #00eaff;
}

.instagram{
color:#ff2bd6;
margin-bottom:40px;
}

/* 버튼 */

button{
padding:16px 30px;
margin:10px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;

background:linear-gradient(45deg,#00eaff,#0066ff);
color:white;

box-shadow:0 0 20px #00eaff;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* 번호 영역 */

#numbers{
margin-top:40px;
display:flex;
justify-content:center;
gap:20px;
}

/* 로또볼 */

.ball{

width:70px;
height:70px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:22px;
font-weight:bold;

background:radial-gradient(circle at 30% 30%, white, #ffd000 40%, #ff8c00);

box-shadow:
0 0 15px rgba(255,255,255,0.7),
inset -5px -10px 15px rgba(0,0,0,0.4);

transform:scale(0) rotate(0deg);

}

/* 등장 애니메이션 */

.show{
animation:pop 0.6s forwards;
}

@keyframes pop{

0%{
transform:scale(0) rotate(0deg);
}

60%{
transform:scale(1.2) rotate(360deg);
}

100%{
transform:scale(1) rotate(720deg);
}

}

.footer{
margin-top:60px;
color:#777;
}

</style>
</head>

<body>

<div class="title">JOGUN 4D LOTTO</div>

<div class="instagram">
INSTAGRAM @soowan_jogun
</div>

<button onclick="draw3D()">🎰 3D 추첨</button>
<button onclick="drawAI()">🤖 AI 추천</button>

<div id="numbers"></div>

<div class="footer">
Created by JOGUN
</div>

<script>

/* 랜덤 번호 */

function randomNumbers(){

let numbers=[];

while(numbers.length<5){

let n=Math.floor(Math.random()*45)+1;

if(!numbers.includes(n)){
numbers.push(n);
}

}

return numbers.sort((a,b)=>a-b);

}

/* 3D 추첨 */

function draw3D(){

let container=document.getElementById("numbers");
container.innerHTML="";

let nums=randomNumbers();

nums.forEach((num,i)=>{

setTimeout(()=>{

let ball=document.createElement("div");

ball.className="ball";

ball.innerText=num;

container.appendChild(ball);

setTimeout(()=>{

ball.classList.add("show");

},50);

},i*700);

});

}

/* AI 추천 (가중치 방식) */

function drawAI(){

let container=document.getElementById("numbers");
container.innerHTML="";

/* 가짜 과거 데이터 */

let history=[
1,3,5,7,8,10,12,14,17,19,
21,23,24,27,29,31,33,36,38,41
];

/* 확률 계산 */

let pool=[];

for(let i=1;i<=45;i++){

let weight=history.includes(i)?1:3;

for(let j=0;j<weight;j++){
pool.push(i);
}

}

let result=[];

while(result.length<5){

let pick=pool[Math.floor(Math.random()*pool.length)];

if(!result.includes(pick)){
result.push(pick);
}

}

result.sort((a,b)=>a-b);

result.forEach((num,i)=>{

setTimeout(()=>{

let ball=document.createElement("div");

ball.className="ball";

ball.innerText=num;

container.appendChild(ball);

setTimeout(()=>{

ball.classList.add("show");

},50);

},i*700);

});

}

</script>

</body>
</html>
